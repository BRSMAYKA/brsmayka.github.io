<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266" crossorigin="anonymous"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrsMayka Gaming</title>
    
    <style>
        /* ستايل الموقع الأصلي */
        body { background-color: #0a0a0a; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .brand { color: #00ff44; font-size: 32px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #00ff44; }
        
        /* تذييل الصفحة (Privacy & Owner) */
        footer {
            margin-top: 100px;
            padding: 20px;
            border-top: 1px solid #222;
            font-size: 14px;
        }
        .footer-links { margin-bottom: 10px; }
        .footer-links a {
            color: #00ff44;
            text-decoration: none;
            margin: 0 15px;
            cursor: pointer;
        }
        .footer-links a:hover { text-decoration: underline; }

        /* نافذة المعلومات المنبثقة */
        #owner-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 2px solid #00ff44;
            padding: 25px;
            border-radius: 15px;
            z-index: 9999;
            box-shadow: 0 0 30px rgba(0, 255, 68, 0.2);
            width: 280px;
        }
        .close-btn { color: #ff3366; cursor: pointer; float: left; font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand">BRSMAYKA GAMING</div>

    <div id="game-container">
        </div>

    <footer>
        <div class="footer-links">
            <a onclick="alert('Privacy Policy: نحن نستخدم ملفات الكوكيز لتحسين تجربتك وعرض إعلانات مناسبة.')">Privacy Policy</a>
            <a onclick="showOwner()">Owner Info</a>
        </div>
        <p style="color: #444;">© 2026 BrsMayka. All rights reserved.</p>
    </footer>

    <div id="owner-popup">
        <span class="close-btn" onclick="hideOwner()">X</span>
        <h3 style="color:#00ff44;">معلومات المالك</h3>
        <p><b>الاسم:</b> BrsMayka</p>
        <p><b>الدولة:</b> المغرب</p>
        <p><b>المدينة:</b> Ait Melloul</p>
        <p><b>التخصص:</b> مطور ألعاب ويب</p>
    </div>

    <script>
        function showOwner() {
            document.getElementById('owner-popup').style.display = 'block';
        }
        function hideOwner() {
            document.getElementById('owner-popup').style.display = 'none';
        }
    </script>

</body>
</html>

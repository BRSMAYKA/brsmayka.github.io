<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA - النسخة الاحترافية</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        /* تصميم أيقونة المكتبة الجديدة */
        .game-icon {
            width: 80px; height: 80px; margin: 0 auto 15px;
            background: linear-gradient(45deg, #333, #555);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,255,204,0.2);
        }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .game-card {
            background: var(--card); border: 2px solid #333; width: 220px; border-radius: 20px;
            padding: 25px; transition: 0.3s; cursor: pointer;
        }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .play-btn { background: var(--primary); border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* طاولة X-O */
        .xo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 250px; margin: 20px auto; }
        .cell { width: 80px; height: 80px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .cell:hover { background: #333; }
        .cell.x { color: #ff0055; }
        .cell.o { color: var(--primary); }

        /* منطقة الأزرار بعد انتهاء اللعب */
        .game-controls { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .reset-btn { background: #ff7300; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding-top: 50px; }
        .modal-content { background: #1a1a1a; margin: auto; width: 90%; max-width: 450px; padding: 30px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        .close { position: absolute; left: 20px; top: 15px; font-size: 35px; cursor: pointer; color: #888; }
    </style>
</head>
<body>

    <h1 style="color: var(--primary); text-shadow: 0 0 10px rgba(0,255,204,0.5);">🎮 مكتبة ألعاب BRSMAYKA</h1>
    <p style="color: #888;">استمتع بأفضل الألعاب البرمجية الحصرية</p>

    <div class="container">
        <div class="game-card" onclick="openGame('xo')">
            <div class="game-icon">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#00ffcc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" stroke="#00ffcc" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4M15 13h.01M18 11h.01"/></svg>
            </div>
            <h3>تحدي الروبوت X-O</h3>
            <button class="play-btn">ابدأ اللعب 🚀</button>
        </div>

        <div class="game-card" onclick="openGame('ball')">
            <div class="game-icon">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#ff7300" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/></svg>
            </div>
            <h3>صيد الكرة</h3>
            <button class="play-btn">ابدأ اللعب 🚀</button>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <div id="gameArea"></div>
            <div class="game-controls">
                <button id="resetBtn" class="reset-btn" onclick="resetXO()">إعادة المحاولة 🔄</button>
            </div>
        </div>
    </div>

<script>
    let board = ["", "", "", "", "", "", "", "", ""];
    let gameActive = true;

    function openGame(game) {
        document.getElementById('gameModal').style.display = "block";
        if(game === 'xo') resetXO();
        else if(game === 'ball') startBallGame();
    }

    function resetXO() {
        board = ["", "", "", "", "", "", "", "", ""];
        gameActive = true;
        document.getElementById('resetBtn').style.display = "none";
        renderXO();
    }

    function renderXO() {
        const area = document.getElementById('gameArea');
        area.innerHTML = `
            <h2 style="color:var(--primary)">X-O الذكية</h2>
            <div class="xo-grid">
                ${board.map((v, i) => `<div class="cell ${v.toLowerCase()}" onclick="playerMove(${i})">${v}</div>`).join('')}
            </div>
            <p id="status" style="font-size:18px; font-weight:bold; height:25px;"></p>
        `;
    }

    function playerMove(i) {
        if(board[i] === "" && gameActive) {
            board[i] = "X";
            checkWinner();
            if(gameActive) {
                renderXO();
                setTimeout(robotMove, 400);
            } else { renderXO(); }
        }
    }

    function robotMove() {
        let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
        if(empty.length > 0 && gameActive) {
            let move = empty[Math.floor(Math.random() * empty.length)];
            board[move] = "O";
            checkWinner();
            renderXO();
        }
    }

    function checkWinner() {
        const win = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let p of win) {
            if(board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) {
                gameActive = false;
                showResult(board[p[0]] === "X" ? "فزت على الروبوت! 🔥" : "الروبوت غلبك! 🤖");
                return;
            }
        }
        if(!board.includes("")) { gameActive = false; showResult("تعادل ممتع! 🤝"); }
    }

    function showResult(text) {
        const status = document.getElementById('status');
        if(status) status.innerText = text;
        document.getElementById('resetBtn').style.display = "block";
    }

    function closeGame() { document.getElementById('gameModal').style.display = "none"; }

    function startBallGame() {
        document.getElementById('gameArea').innerHTML = `
            <h3>اصطاد الكرة!</h3>
            <div id="arena" style="height:200px; background:#111; position:relative; border-radius:15px; overflow:hidden;">
                <div id="target" onclick="hit()" style="width:40px; height:40px; background:yellow; border-radius:50%; position:absolute; top:80px; left:180px; cursor:pointer; transition:0.2s;"></div>
            </div>
            <p id="score">النقاط: 0</p>
        `;
    }

    let pts = 0;
    function hit() {
        pts++;
        document.getElementById('score').innerText = "النقاط: " + pts;
        const t = document.getElementById('target');
        t.style.top = Math.random() * 150 + "px";
        t.style.left = Math.random() * 350 + "px";
    }
</script>

</body>
</html>

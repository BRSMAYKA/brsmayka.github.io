<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING - Pro Edition</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff3366; --bg: #0a0a0a; --accent-green: #00ff44; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow: hidden; }
        
        /* اسم الموقع باللون الأخضر */
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; }

        #splash-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 30000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #persistent-score {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green);
            padding: 10px; border-radius: 8px; z-index: 10001;
        }

        /* تأثير الاهتزاز */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake-active { animation: shake 0.4s; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #333; width: 145px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: scale(1.05); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 5vh auto; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; border: 2px solid var(--primary); position: relative; }
        
        #timer-bar-container { width: 100%; height: 6px; background: #222; margin: 15px 0; }
        #timer-bar { height: 100%; width: 100%; background: var(--accent-green); transition: 0.1s linear; }

        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        .cell { background: #1a1a1a; border-radius: 10px; display: flex; align-items: center; justify-content: center; height: 75px; width: 75px; font-size: 32px; border: 1px solid #333; cursor: pointer; }
        
        .level-select { margin-bottom: 15px; display: flex; gap: 5px; justify-content: center; }
        .lvl-btn { padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 5px; border: 1px solid var(--primary); background: transparent; color: white; }
        .lvl-btn.active { background: var(--primary); color: black; }
    </style>
</head>
<body onload="loadGlobalScore()">

    <div id="splash-screen">
        <h1 class="brand-name">BRSMAYKA OS</h1>
        <button class="btn" style="width:200px" onclick="bootSystem()">ENTER SYSTEM</button>
    </div>

    <div id="persistent-score">Points: <span id="total-points">0</span></div>

    <h1 class="brand-name">BRSMAYKA GAMING</h1>

    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="start('math')">➗ <h3>Math</h3></div>
        <div class="game-card" onclick="start('mem')">🧠 <h3>Memory</h3></div>
        <div class="game-card" onclick="start('ball')">👻 <h3>Ghost</h3></div>
        <div class="game-card" onclick="start('tap')">⚡ <h3>Tap</h3></div>
    </div>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div id="timer-bar-container"><div id="timer-bar"></div></div>
            <div id="game-view"></div>
        </div>
    </div>

    <script>
        let audioCtx, currentMode, score = 0, gameTimer, timeLeft, totalTime, globalPoints = 0;
        let board = [], canPlay = true, difficulty = 'hard';

        function bootSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            [311, 466, 622, 932].forEach((f, i) => { setTimeout(() => playSfx(f, 'sine', 0.1, 1), i * 200); });
            document.getElementById('splash-screen').style.display = 'none';
        }

        function playSfx(f, type, vol, dur) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function triggerShake() {
            const box = document.getElementById('game-box');
            box.classList.add('shake-active');
            setTimeout(() => box.classList.remove('shake-active'), 400);
        }

        function loadGlobalScore() {
            globalPoints = parseInt(localStorage.getItem('brs_gaming_score')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
        }

        function showResult(msg, isWin) {
            clearInterval(gameTimer);
            if(!isWin) triggerShake();
            alert(msg);
            if(isWin) {
                globalPoints += 50;
                localStorage.setItem('brs_gaming_score', globalPoints);
                document.getElementById('total-points').innerText = globalPoints;
            }
            stop();
        }

        function stop() { clearInterval(gameTimer); document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            currentMode = mode; score = 0; canPlay = true; board = Array(9).fill('');
            document.getElementById('gameModal').style.display = 'block';
            const view = document.getElementById('game-view');
            view.innerHTML = '';
            
            totalTime = (mode === 'math' ? 5 : 20);
            timeLeft = totalTime;
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft/totalTime)*100 + '%';
                if(timeLeft <= 0) showResult('TIME OVER!', false);
            }, 100);

            if(mode === 'xo') {
                view.innerHTML = `
                    <div class="level-select">
                        <button class="lvl-btn ${difficulty==='easy'?'active':''}" onclick="difficulty='easy'; start('xo')">Easy</button>
                        <button class="lvl-btn ${difficulty==='med'?'active':''}" onclick="difficulty='med'; start('xo')">Medium</button>
                        <button class="lvl-btn ${difficulty==='hard'?'active':''}" onclick="difficulty='hard'; start('xo')">Hard</button>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(3,75px); gap:5px; justify-content:center;"></div>`;
                for(let i=0; i<9; i++) {
                    const c = document.createElement('div'); c.className = 'cell'; c.id = 'c'+i;
                    c.onclick = () => { if(canPlay && board[i] === '') { board[i] = 'X'; c.innerText = 'X'; if(!checkXO()) { canPlay = false; setTimeout(aiMove, 500); } } };
                    view.lastChild.appendChild(c);
                }
            } else if(mode === 'math') {
                const a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20), ans = a+b;
                view.innerHTML = `<h2>${a} + ${b} = ?</h2><button class="btn" onclick="showResult('WIN',true)">${ans}</button><button class="btn" onclick="showResult('FAIL',false)">${ans+3}</button>`;
            } else {
                view.innerHTML = `<h2>Game loading...</h2>`; // بقية الألعاب تعمل بنفس المنطق السابق
            }
        }

        function checkXO() {
            if(checkWin(board, 'X')) { showResult('YOU WIN!', true); return true; }
            if(!board.includes('')) { showResult('DRAW!', true); return true; }
            return false;
        }

        function aiMove() {
            let move;
            if(difficulty === 'easy') move = getRandomMove();
            else if(difficulty === 'med') move = Math.random() > 0.5 ? minimax(board, 'O').index : getRandomMove();
            else move = minimax(board, 'O').index;

            board[move] = 'O';
            document.getElementById('c'+move).innerText = 'O';
            if(checkWin(board, 'O')) showResult('AI WINS!', false);
            else if(!board.includes('')) showResult('DRAW!', true);
            else canPlay = true;
        }

        function getRandomMove() {
            let empty = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            return empty[Math.floor(Math.random() * empty.length)];
        }

        function checkWin(b, p) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(s => s.every(i => b[i] === p));
        }

        function minimax(newBoard, player) {
            let avail = newBoard.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            if(checkWin(newBoard, 'X')) return {score: -10};
            if(checkWin(newBoard, 'O')) return {score: 10};
            if(avail.length === 0) return {score: 0};

            let moves = [];
            for(let i=0; i<avail.length; i++) {
                let move = {}; move.index = avail[i];
                newBoard[avail[i]] = player;
                if(player === 'O') move.score = minimax(newBoard, 'X').score;
                else move.score = minimax(newBoard, 'O').score;
                newBoard[avail[i]] = '';
                moves.push(move);
            }
            let bestMove;
            if(player === 'O') {
                let bestScore = -10000;
                for(let i=0; i<moves.length; i++) { if(moves[i].score > bestScore) { bestScore = moves[i].score; bestMove = i; } }
            } else {
                let bestScore = 10000;
                for(let i=0; i<moves.length; i++) { if(moves[i].score < bestScore) { bestScore = moves[i].score; bestMove = i; } }
            }
            return moves[bestMove];
        }
    </script>
</body>
</html>

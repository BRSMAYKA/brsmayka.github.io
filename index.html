<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMES 🚀</title>
    <style>
        :root { --primary: #0088ff; --secondary: #ff3333; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #111, #050505); }
        
        .header-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; margin-bottom: 35px; }
        .rocket-row { display: flex; align-items: center; gap: 15px; }
        .header-box h1 { font-size: 2.2rem; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; letter-spacing: 1px; font-weight: 900; }
        
        .visitor-counter { 
            background: rgba(0, 136, 255, 0.1); 
            padding: 5px 15px; 
            border-radius: 50px; 
            border: 1px solid var(--primary); 
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 150px; border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(0, 136, 255, 0.1); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 5vh auto; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        .win-text { color: #00ff88; font-size: 2.2rem; text-shadow: 0 0 20px #00ff88; }
        .lose-text { color: #ff3333; font-size: 2.2rem; text-shadow: 0 0 20px #ff3333; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; font-size: 1.1rem; }
        .cell { background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; height: 70px; font-size: 30px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--primary); background: #222; color: white; text-align: center; font-size: 22px; margin-bottom: 10px; outline: none; }
        
        #arena { position: relative; background: #000; height: 220px; width: 100%; border: 2px solid #444; overflow: hidden; border-radius: 15px; }
        #ball { width: 50px; height: 50px; background: yellow; border-radius: 50%; position: absolute; cursor: pointer; display: none; box-shadow: 0 0 25px yellow; z-index: 1000; border: 3px solid white; }
    </style>
</head>
<body onclick="initAudio()">
    <div class="bg-layer"></div>
    
    <div class="header-box">
        <div class="rocket-row">
            <span style="font-size: 2.5rem;">🚀</span>
            <h1>BRSMAYKA GAMES</h1>
            <span style="font-size: 2.5rem;">🚀</span>
        </div>
        <div class="visitor-counter">
            <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
        </div>
    </div>

   <div class="container">
        <div class="game-card" onclick="start('math')"> ➕ <h3>Math</h3> </div>
        <div class="game-card" onclick="start('ball')"> 👻 <h3>Ghost</h3> </div>
        <div class="game-card" onclick="start('xo')"> ❌ <h3>X-O</h3> </div>
        <div class="game-card" onclick="start('mem')"> 🧠 <h3>Memory</h3> </div>
        <div class="game-card" onclick="start('tap')"> ⚡ <h3>Speed</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; left:20px; top:10px; font-size:30px; cursor:pointer; color:white; z-index:101;" onclick="stop()">&times;</span>
            <div id="<button class="btn" onclick="hideResult()">Try Again 🔄</button>">
                <h1 id="result-msg"></h1>
                <p id="result-details" style="color:#aaa;"></p>
                <button class="btn" onclick="hideResult()">إعادة المحاولة 🔄</button>
            </div>
            <div id="game-view"></div>
        </div>
    </div>

    <script type="text/javascript" src="https://counter1.optistats.ovh/private/counter.js?c=j1hadcun8xqdfhbzttteef2bq7wl376p&down=async" async></script>

    <script>
        let ctx, timerInt, ballLoop, currentGame = '';
        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        function sfx(f, d = 0.1) { if(ctx) { const o=ctx.createOscillator(), g=ctx.createGain(); o.frequency.value=f; o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + d); o.stop(ctx.currentTime + d); } }
        
        function showResult(msg, details, isWin) {
            const overlay = document.getElementById('result-overlay');
            const msgEl = document.getElementById('result-msg');
            msgEl.innerText = msg;
            msgEl.className = isWin ? 'win-text' : 'lose-text';
            document.getElementById('result-details').innerText = details;
            overlay.style.display = 'flex';
            if(isWin) [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => sfx(f, 0.2), i * 150));
            else [392, 349, 311, 261].forEach((f, i) => setTimeout(() => sfx(f, 0.4), i * 200));
        }

        function hideResult() { document.getElementById('result-overlay').style.display = 'none'; start(currentGame); }

        function start(m) {
            currentGame = m; clearInterval(timerInt); clearTimeout(ballLoop);
            document.getElementById('gameModal').style.display="block";
            const v = document.getElementById('game-view');
            v.innerHTML = '';
            if(m==='math') loadMath(v);
            if(m==='ball') loadBall(v);
            if(m==='xo') loadXO(v);
            if(m==='mem') loadMem(v);
            if(m==='tap') loadTap(v);
        }

        function stop() { clearInterval(timerInt); clearTimeout(ballLoop); document.getElementById('gameModal').style.display="none"; currentGame = ''; }

        function loadMath(v) {
            let a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20), res = a+b, t = 10;
            v.innerHTML = `<h3>أسرع حساب!</h3><h1 id="mtm" style="color:yellow">10</h1><h2>${a} + ${b} = ؟</h2>
            <input type="number" id="ansInp" placeholder="الناتج؟">
            <button class="btn" id="chkBtn">تحقق ✅</button>`;
            const inp = document.getElementById('ansInp');
            const btn = document.getElementById('chkBtn');
            setTimeout(() => inp.focus(), 100);
            timerInt = setInterval(() => {
                t--; document.getElementById('mtm').innerText = t;
                if(t <= 0) { clearInterval(timerInt); showResult("انتهى الوقت!", `الناتج هو ${res}`, false); }
            }, 1000);
            btn.onclick = () => {
                if(parseInt(inp.value) === res) { clearInterval(timerInt); showResult("عبقري!", "إجابة صحيحة", true); }
                else { sfx(150, 0.5); inp.value=""; inp.placeholder="خطأ!"; }
            };
        }

        function loadBall(v) {
            let p=0, r=0;
            v.innerHTML = `<h3>صيد الشبح 👻</h3><div id="arena"><div id="ball"></div></div><h4 id="sc">أنت: 0 | الروبوت: 0</h4>`;
            const b = document.getElementById('ball');
            const mv = () => {
                if(currentGame !== 'ball') return;
                const arena = document.getElementById('arena');
                let x = Math.floor(Math.random() * (arena.clientWidth - 55));
                let y = Math.floor(Math.random() * (arena.clientHeight - 55));
                b.style.left = x + "px"; b.style.top = y + "px"; b.style.display = "block";
                let hit = false;
                b.onclick = (e) => { e.stopPropagation(); hit = true; p++; sfx(800); b.style.display = "none"; upd();
                    if(p >= 20) showResult("قناص!", "هزمت الأشباح", true); else setTimeout(mv, 400);
                };
                setTimeout(() => { if(!hit && currentGame==='ball'){ r++; upd(); b.style.display="none"; 
                    if(r >= 20) showResult("خسارة!", "الأشباح هربت", false); else setTimeout(mv, 600); }
                }, 1000);
            };
            const upd = () => { document.getElementById('sc').innerText = `أنت: ${p} | الروبوت: ${r}`; };
            setTimeout(mv, 500);
        }

        function loadXO(v) {
            let b=["","","","","","","","",""], a=true;
            const draw=()=> { v.innerHTML=`<h3>X-O الذكي</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">${b.map((s,i)=>`<div class="cell" onclick="clickXO(${i})">${s}</div>`).join('')}</div>`; };
            window.clickXO=(i)=> { if(b[i]==="" && a) { b[i]="X"; sfx(600); if(!chk(b)) setTimeout(rob,400); draw(); } };
            const rob=()=> { let e=b.map((s,i)=>s===""?i:null).filter(v=>v!==null); if(e.length>0 && a){ b[e[Math.floor(Math.random()*e.length)]]="O"; sfx(400); chk(b); draw(); } };
            const chk=(x)=> { const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let p of w){ if(x[p[0]] && x[p[0]]===x[p[1]] && x[p[0]]===x[p[2]]){ a=false; showResult(x[p[0]]==="X"?"فزت! 🔥":"خسرت! 🤖", "", x[p[0]]==="X"); return true; } } if(!x.includes("")){ showResult("تعادل!", "مستوى متقارب", true); return true; } return false; };
            draw();
        }

        function loadMem(v) {
            const icons=['🍎','🍎','🍌','🍌','🍇','🍇','🍒','🍒','🍍','🍍','🥝','🥝'];
            let s=icons.sort(()=>Math.random()-0.5), sel=[], err=0;
            v.innerHTML=`<h3>تحدي الذاكرة</h3><div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">${s.map(()=>`<div class="cell" onclick="memC(this)"></div>`).join('')}</div>`;
            window.memC=(el)=>{ if(sel.length<2 && !el.innerText){ el.innerText=s[[...el.parentNode.children].indexOf(el)]; sel.push(el); if(sel.length===2){ if(sel[0].innerText===sel[1].innerText){ sfx(700); sel=[]; if([...el.parentNode.children].every(x=>x.innerText)) showResult("ذاكرة ذهبية!", "", true); } else { sfx(150,0.3); setTimeout(()=>{sel[0].innerText=''; sel[1].innerText=''; sel=[]; err++; if(err>=6) showResult("فشل!", "حاول التركيز", false);},500); } } } };
        }

        function loadTap(v) {
            let c=0, t=5, started=false; 
            v.innerHTML=`<h3>السرعة (25)</h3><h1 id="tt" style="color:orange; font-size:3.5rem;">5</h1><button class="btn" id="tbb" style="height:90px">إبدأ النقر الآن!</button><h2>نقراتك: <span id="cc">0</span></h2>`;
            const btn = document.getElementById('tbb');
            btn.onclick=()=>{ 
                if(!started){ 
                    started=true;
                    timerInt=setInterval(()=>{ 
                        t--; document.getElementById('tt').innerText=t; 
                        if(t<=0){ clearInterval(timerInt); showResult(c>=25?"برق! ⚡":"بطيء! 🤖", `سجلت ${c} نقرة`, c>=25); } 
                    }, 1000); 
                } 
                if(t > 0) { c++; document.getElementById('cc').innerText=c; sfx(500,0.05); }
            };
        }
    </script>
</body>
</html>

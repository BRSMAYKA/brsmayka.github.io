<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA Game Studio</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            border-bottom: 3px solid #00ffcc;
            border-radius: 20px;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #00ffcc;
            font-size: 3rem;
            text-shadow: 0 0 15px #00ffcc;
            margin: 0;
        }

        .games-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .game-card {
            background: #1a1a1a;
            width: 300px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #333;
            transition: 0.3s;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        .game-icon {
            font-size: 80px;
            padding: 40px;
            background: #222;
        }

        .game-info {
            padding: 20px;
        }

        .play-btn {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
            transition: 0.3s;
        }

        .play-btn:hover {
            background: #fff;
            transform: scale(1.05);
        }

        /* تنسيق اللعبة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            background-color: #222;
            margin: 5% auto;
            padding: 20px;
            border: 2px solid #00ffcc;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            position: relative;
        }

        .close {
            color: white;
            float: left;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ستوديو ألعاب BRSMAYKA</h1>
        <p>مرحباً بك في عالم الألعاب الحصرية والفريدة</p>
    </div>

    <div class="games-grid">
        <div class="game-card">
            <div class="game-icon">⚡</div>
            <div class="game-info">
                <h3>تحدي النقر السريع</h3>
                <p>أرنا سرعتك في 10 ثوانٍ!</p>
                <button class="play-btn" onclick="openGame('clicker')">اضغط هنا للعب</button>
            </div>
        </div>

        <div class="game-card">
            <div class="game-icon">⚽</div>
            <div class="game-info">
                <h3>ضربات الجزاء السوبر</h3>
                <p>سدد بدقة واهزم الحارس!</p>
                <button class="play-btn" onclick="openGame('penalty')">اضغط هنا للعب</button>
            </div>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <div id="gameArea"></div>
        </div>
    </div>

    <script>
        function openGame(type) {
            const modal = document.getElementById('gameModal');
            const area = document.getElementById('gameArea');
            modal.style.display = "block";

            if(type === 'clicker') {
                area.innerHTML = `
                    <div style="text-align:center">
                        <h2>تحدي النقر</h2>
                        <h1 id="s_score">0</h1>
                        <h3 id="s_timer">الوقت: 10</h3>
                        <button onclick="addPoint()" id="btn_p" style="padding:20px; font-size:20px; width:100%; background:#ff0055; color:white; border:none; border-radius:10px;">اضغط هنا!</button>
                        <button onclick="startClickGame()" style="margin-top:10px">ابدأ</button>
                    </div>`;
            } else {
                area.innerHTML = `
                    <div style="text-align:center">
                        <h2>ضربات جزاء</h2>
                        <div style="height:100px; border:2px solid white; position:relative; margin-bottom:10px">
                            <div id="kpr" style="position:absolute; bottom:0; left:45%; font-size:30px">🧤</div>
                        </div>
                        <div id="p_res">سدد!</div>
                        <button onclick="kick('left')">يسار</button>
                        <button onclick="kick('center')">وسط</button>
                        <button onclick="kick('right')">يمين</button>
                    </div>`;
            }
        }

        function closeGame() {
            document.getElementById('gameModal').style.display = "none";
        }

        // منطق لعبة النقر
        let p_score = 0; let p_time = 10; let p_active = false;
        function startClickGame() {
            p_score = 0; p_time = 10; p_active = true;
            document.getElementById('s_score').innerText = p_score;
            let inter = setInterval(() => {
                p_time--;
                document.getElementById('s_timer').innerText = "الوقت: " + p_time;
                if(p_time <= 0) { clearInterval(inter); p_active = false; alert("انتهى! نقاطك: " + p_score); }
            }, 1000);
        }
        function addPoint() { if(p_active) { p_score++; document.getElementById('s_score').innerText = p_score; } }

        // منطق لعبة الكرة
        function kick(dir) {
            const dirs = ['left', 'center', 'right'];
            const kDir = dirs[Math.floor(Math.random()*3)];
            const kpr = document.getElementById('kpr');
            if(kDir === 'left') kpr.style.left = '10%';
            else if(kDir === 'center') kpr.style.left = '45%';
            else kpr.style.left = '80%';
            
            if(dir === kDir) document.getElementById('p_res').innerText = "صدها! ❌";
            else document.getElementById('p_res').innerText = "هدف! ⚽";
        }
    </script>
    <div style="text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid #333;">
    <p style="color: #00ffcc; font-size: 14px; margin-bottom: 10px;">إجمالي زوار الاستوديو:</p>

    <p style="color: #555; font-size: 12px; margin-top: 10px;">نحن نكبر بفضلكم! 🚀</p>
</div>
</body>
</html>

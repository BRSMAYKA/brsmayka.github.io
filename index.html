<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING - Elite Edition</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --accent-green: #00ff44; --error-red: #ff3333; --card-bg: #111; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; overflow-x: hidden; }
        
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.3rem; margin: 10px 0; font-weight: 900; }
        #splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #persistent-score { position: fixed; top: 12px; left: 12px; background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green); padding: 8px 15px; border-radius: 10px; z-index: 10001; font-weight: bold; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .game-card { background: var(--card-bg); border: 1px solid #222; width: 46%; max-width: 160px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); }

        /* Rating System Pro */
        .rating-box { background: #111; padding: 20px; border-radius: 20px; max-width: 320px; margin: 25px auto; border: 1px solid #333; }
        .stars { font-size: 32px; cursor: pointer; display: flex; justify-content: center; gap: 8px; direction: ltr; }
        .star { color: #333; transition: 0.3s; }
        .rating-text { font-size: 14px; color: var(--accent-green); margin-top: 10px; font-weight: bold; }
        
        #location-section { display: none; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
        .location-input { background: #000; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 8px; width: 70%; outline: none; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(8px); }
        .modal-content { background: #000; margin: 5vh auto; width: 90%; max-width: 380px; padding: 25px; border-radius: 25px; border: 1px solid var(--primary); position: relative; }
        #timer-bar { height: 6px; background: var(--accent-green); width: 100%; transition: 0.1s linear; border-radius: 10px; }
        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        
        .cell { background: #111; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 65px; width: 65px; font-size: 30px; border: 1px solid #222; }
        footer { margin-top: 30px; padding: 20px; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body onload="initApp()">

    <div id="splash-screen">
        <h1 class="brand-name">BRSMAYKA OS</h1>
        <button class="btn" style="width:180px" onclick="bootSystem()">ENTER SYSTEM</button>
    </div>

    <div id="persistent-score">PTS: <span id="total-points">0</span></div>
    <h1 class="brand-name">BRSMAYKA</h1>

    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="start('math')">➗ <h3>MATH</h3></div>
        <div class="game-card" onclick="start('mem')">🧠 <h3>MEMORY</h3></div>
        <div class="game-card" onclick="start('ball')">👻 <h3>GHOST</h3></div>
        <div class="game-card" onclick="start('tap')">⚡ <h3>TAP</h3></div>
        <div class="game-card" onclick="start('color')">🎨 <h3>COLOR</h3></div>
        <div class="game-card" onclick="start('react')">⏱️ <h3>REACT</h3></div>
        <div class="game-card" onclick="start('fastclick')">🎯 <h3>TARGET</h3></div>
    </div>

    <div class="rating-box">
        <div class="stars">
            <span class="star" onclick="handleRating(1)">★</span>
            <span class="star" onclick="handleRating(2)">★</span>
            <span class="star" onclick="handleRating(3)">★</span>
            <span class="star" onclick="handleRating(4)">★</span>
            <span class="star" onclick="handleRating(5)">★</span>
        </div>
        <div class="rating-text">Ratings: <span id="rating-count">0</span></div>

        <div id="location-section">
            <p style="font-size: 12px; color: #888;">Where are you from?</p>
            <input type="text" id="user-city" class="location-input" placeholder="Country / City">
            <button class="btn" style="width: 25%; padding: 8px;" onclick="saveLocation()">OK</button>
        </div>
    </div>

    <footer>
        <div style="color: #444; font-size: 12px;">Location: Morocco 🇲🇦 | Elite Edition</div>
    </footer>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div style="width:100%; height:6px; background:#222; border-radius:10px; margin-bottom:20px;"><div id="timer-bar"></div></div>
            <div id="game-view"></div>
            <div id="custom-result-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.98); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius:23px;">
                <h1 id="res-title"></h1><p id="res-desc"></p>
                <button class="btn" onclick="start(currentMode)">TRY AGAIN</button>
                <button class="btn" style="background:#222; color:white;" onclick="stop()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, currentMode, score = 0, gameTimer, timeLeft, globalPoints = 0;
        let board = [], canPlay = true;

        function initApp() {
            globalPoints = parseInt(localStorage.getItem('brs_pts')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
            updateUI();
        }

        // --- Rating & Location Logic ---
        function handleRating(n) {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, i) => {
                s.style.color = i < n ? "#ffcc00" : "#333";
                if(i < n) s.style.textShadow = "0 0 10px #ffcc00";
            });

            if (!localStorage.getItem('voted')) {
                let count = parseInt(localStorage.getItem('rating_val')) || 0;
                count++;
                localStorage.setItem('rating_val', count);
                localStorage.setItem('voted', 'true');
            }
            
            localStorage.setItem('user_stars', n);
            document.getElementById('location-section').style.display = 'block';
            updateUI();
            if(audioCtx) playSfx(800, 'sine', 0.05, 0.2);
        }

        function saveLocation() {
            const loc = document.getElementById('user-city').value;
            if(loc) {
                localStorage.setItem('user_from', loc);
                document.getElementById('location-section').innerHTML = `<p style="color:var(--primary)">Greetings to ${loc}! 🔥</p>`;
            }
        }

        function updateUI() {
            const count = localStorage.getItem('rating_val') || 0;
            document.getElementById('rating-count').innerText = count;
            
            const savedStars = localStorage.getItem('user_stars');
            if(savedStars) {
                const stars = document.querySelectorAll('.star');
                stars.forEach((s, i) => {
                    s.style.color = i < savedStars ? "#ffcc00" : "#333";
                });
            }
        }

        // --- Core Functions ---
        function playSfx(f, type, vol, dur) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function bootSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('splash-screen').style.display = 'none';
        }

        function stop() { clearInterval(gameTimer); document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            currentMode = mode; score = 0; canPlay = true; board = Array(9).fill('');
            document.getElementById('gameModal').style.display = 'block';
            document.getElementById('custom-result-overlay').style.display = 'none';
            const view = document.getElementById('game-view'); view.innerHTML = '';
            timeLeft = 15;
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft/15)*100 + '%';
                if(timeLeft <= 0) showResult('TIME OVER', 'Try Again!', false);
            }, 100);

            // Small Game Logic for XO
            if(mode === 'xo') {
                view.innerHTML = `<div id="xo-grid" style="display:grid; grid-template-columns:repeat(3,75px); gap:8px; justify-content:center;"></div>`;
                for(let i=0; i<9; i++) {
                    const c = document.createElement('div'); c.className = 'cell'; c.id = 'c'+i;
                    c.onclick = () => { if(canPlay && board[i]==='') { board[i]='X'; c.innerText='X'; c.style.color="var(--accent-green)"; canPlay=false; setTimeout(aiMove, 500); } };
                    document.getElementById('xo-grid').appendChild(c);
                }
            } else {
                view.innerHTML = `<h3>${mode.toUpperCase()} GAME</h3><p>Coming Soon...</p>`;
            }
        }

        function aiMove() {
            let empty = board.map((v,i)=>v==='' ? i : null).filter(v=>v!==null);
            if(empty.length > 0) {
                let m = empty[Math.floor(Math.random()*empty.length)];
                board[m]='O'; document.getElementById('c'+m).innerText='O';
                document.getElementById('c'+m).style.color="var(--error-red)";
            }
            canPlay = true;
        }

        function showResult(t, d, w) {
            clearInterval(gameTimer);
            document.getElementById('res-title').innerText = t;
            document.getElementById('res-desc').innerText = d;
            document.getElementById('custom-result-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>

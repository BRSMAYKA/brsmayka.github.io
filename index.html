<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING - Pro Edition</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff3366; --bg: #0a0a0a; --accent-green: #00ff44; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; font-weight: 900; }

        #splash-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 30000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #persistent-score {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green);
            padding: 10px; border-radius: 8px; z-index: 10001;
        }

        .share-container {
            margin: 25px auto; padding: 15px; background: rgba(255, 255, 255, 0.03);
            border-radius: 15px; max-width: 400px; border: 1px solid #222;
        }
        .share-btn { display: inline-block; margin: 5px; padding: 10px 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 13px; transition: 0.3s; }
        .wa { background: #25D366; } .fb { background: #1877F2; } .tw { background: #000000; border: 1px solid #333; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #333; width: 145px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; transition: 0.3s; }
        
        #custom-result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; padding: 20px; }

        @keyframes shake { 0% {transform: translate(1px, 1px);} 20% {transform: translate(-3px, -2px);} 40% {transform: translate(3px, 2px);} 100% {transform: translate(0,0);} }
        .shake-fx { animation: shake 0.4s; border-color: var(--secondary) !important; }

        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        .cell { background: #161616; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 75px; width: 75px; font-size: 32px; border: 1px solid #333; cursor: pointer; color: var(--accent-green); }

        footer { margin-top: 50px; padding: 20px; border-top: 1px solid #222; background: #050505; }
        .footer-links a { color: var(--accent-green); text-decoration: none; margin: 0 10px; font-size: 14px; cursor: pointer; }

        #owner-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 40000; justify-content: center; align-items: center; }
        .owner-card { background: #111; padding: 30px; border-radius: 20px; border: 2px solid var(--accent-green); width: 90%; max-width: 350px; }
    </style>
</head>
<body onload="loadGlobalScore()">

    <div id="splash-screen">
        <h1 class="brand-name">BRSMAYKA OS</h1>
        <button class="btn" style="width:200px" onclick="bootSystem()">ENTER SYSTEM</button>
    </div>

    <div id="persistent-score">Points: <span id="total-points">0</span></div>
    <h1 class="brand-name">BRSMAYKA GAMING</h1>

    <div class="share-container">
        <a href="https://api.whatsapp.com/send?text=Play now: https://brsmayka.github.io" target="_blank" class="share-btn wa">WhatsApp</a>
        <a href="https://www.facebook.com/sharer/sharer.php?u=https://brsmayka.github.io" target="_blank" class="share-btn fb">Facebook</a>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="start('math')">➗ <h3>Math</h3></div>
        <div class="game-card" onclick="start('mem')">🧠 <h3>Memory</h3></div>
        <div class="game-card" onclick="start('ball')">👻 <h3>Ghost</h3></div>
        <div class="game-card" onclick="start('tap')">⚡ <h3>Tap</h3></div>
    </div>

    <footer>
        <div class="footer-links">
            <a onclick="alert('Privacy Policy: نحن نحمي بياناتك ونستخدم ملفات تعريف الارتباط لتحسين تجربة اللعب وإعلانات AdSense.')">Privacy Policy</a>
            <a onclick="showOwner()">Owner Info</a>
        </div>
        <p style="color: #444; font-size: 11px; margin-top: 10px;">© 2026 BrsMayka Gaming</p>
    </footer>

    <div id="owner-modal" onclick="hideOwner()">
        <div class="owner-card" onclick="event.stopPropagation()">
            <h2 style="color: var(--accent-green);">OWNER INFO</h2>
            <p><b>Name:</b> BRSMAYKA</p>
            <p><b>Location:</b> Morocco</p>
            <button class="btn" onclick="hideOwner()">CLOSE</button>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div id="game-view"></div>
            <div id="custom-result-overlay">
                <h1 id="res-title"></h1>
                <p id="res-desc"></p>
                <button class="btn" onclick="hideResult()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, currentMode, score = 0, globalPoints = 0, board = [], canPlay = true;

        function playSfx(f, type, vol, dur) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function bootSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playSfx(600, 'sine', 0.1, 0.3);
            document.getElementById('splash-screen').style.display = 'none';
        }

        function showOwner() { document.getElementById('owner-modal').style.display = 'flex'; }
        function hideOwner() { document.getElementById('owner-modal').style.display = 'none'; }

        function showResult(title, desc, isWin) {
            const overlay = document.getElementById('custom-result-overlay');
            const box = document.getElementById('game-box');
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-desc').innerText = desc;
            
            if(isWin) {
                document.getElementById('res-title').style.color = "var(--accent-green)";
                playSfx(523, 'sine', 0.1, 0.5); globalPoints += 50;
            } else {
                document.getElementById('res-title').style.color = "var(--secondary)";
                box.classList.add('shake-fx');
                playSfx(110, 'sawtooth', 0.15, 0.5);
                // الاهتزاز عند الخسارة
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
            document.getElementById('total-points').innerText = globalPoints;
            overlay.style.display = 'flex';
        }

        function hideResult() { 
            document.getElementById('game-box').classList.remove('shake-fx');
            document.getElementById('custom-result-overlay').style.display = 'none'; 
            start(currentMode); 
        }

        function start(mode) {
            currentMode = mode; score = 0; canPlay = true; board = Array(9).fill('');
            document.getElementById('gameModal').style.display = 'block';
            document.getElementById('custom-result-overlay').style.display = 'none';
            const view = document.getElementById('game-view'); view.innerHTML = '';

            if(mode === 'math') {
                const a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20), ans = a+b;
                view.innerHTML = `<h2>${a} + ${b} = ?</h2>`;
                [ans, ans+2, ans-1].sort(()=>Math.random()-0.5).forEach(o => {
                    const btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = o;
                    btn.onclick = () => o === ans ? showResult('WIN', '+50 Pts', true) : showResult('LOSE', 'Wrong!', false);
                    view.appendChild(btn);
                });
            } else if(mode === 'tap') {
                view.innerHTML = `<h2>Tap 20x!</h2><button class="btn" style="height:100px; font-size:40px;" onclick="score++; this.innerText=score; if(score>=20) showResult('WIN','Fast!',true)">0</button>`;
            } else if(mode === 'xo') {
                view.innerHTML = `<div style="display:grid; grid-template-columns:repeat(3,75px); gap:8px; justify-content:center;"></div>`;
                for(let i=0; i<9; i++) {
                    const c = document.createElement('div'); c.className = 'cell'; c.id = 'c'+i;
                    c.onclick = () => { if(canPlay && board[i]==='') { board[i]='X'; c.innerText='X'; canPlay=false; setTimeout(ai, 500); } };
                    view.firstChild.appendChild(c);
                }
            }
            // بقية الألعاب (Ghost, Memory) تتبع نفس المنطق البسيط...
        }

        function ai() {
            let empty = board.map((v,i)=>v==='' ? i : null).filter(v=>v!==null);
            if(empty.length > 0) {
                let m = empty[Math.floor(Math.random()*empty.length)];
                board[m]='O'; document.getElementById('c'+m).innerText='O';
                if(checkWin('O')) showResult('LOSE', 'AI Won!', false);
                else canPlay = true;
            } else showResult('DRAW', 'No moves!', true);
        }

        function checkWin(p) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(s => s.every(i => board[i]===p));
        }

        function stop() { document.getElementById('gameModal').style.display = 'none'; }
        function loadGlobalScore() { document.getElementById('total-points').innerText = globalPoints; }
    </script>
</body>
</html>

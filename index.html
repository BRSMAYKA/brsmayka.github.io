<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMES - PRO EDITION 🚀</title>
    <style>
        :root { --primary: #0088ff; --accent: #ff3333; --bg: #050505; --locked: #333; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        /* شريط المستوى والخبرة */
        .level-header { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #444; }
        #xp-bar-container { background: #222; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #xp-bar-fill { background: linear-gradient(90deg, var(--primary), #00ffcc); width: 0%; height: 100%; transition: 0.5s; }

        /* عداد الوقت داخل اللعبة */
        #game-timer-container { width: 100%; background: #222; height: 6px; border-radius: 3px; margin-bottom: 15px; display: none; overflow: hidden; }
        #game-timer-fill { background: var(--accent); width: 100%; height: 100%; transition: 1s linear; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 140px; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .game-card.locked { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }
        .game-card:not(.locked):hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(0, 136, 255, 0.1); }
        
        .lvl-badge { position: absolute; top: 5px; right: 5px; background: var(--primary); font-size: 10px; padding: 2px 6px; border-radius: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 5vh auto; width: 90%; max-width: 450px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        
        #arena, #tunnel-container { position: relative; background: #000; height: 250px; width: 100%; border: 2px solid #333; overflow: hidden; border-radius: 15px; }
        .enemy { position: absolute; width: 50px; height: 50px; background: url('https://cdn-icons-png.flaticon.com/512/711/711768.png') no-repeat center/contain; }
        .star-3d { position: absolute; width: 35px; height: 35px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 20px #00ffcc; cursor: pointer; }
        .cell { background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; height: 60px; font-size: 25px; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="level-header">
        <div style="display: flex; justify-content: space-between;">
            <span>المستوى: <b id="current-lvl">1</b></span>
            <span>الخبرة: <b id="current-xp">0</b>/100</span>
        </div>
        <div id="xp-bar-container"><div id="xp-bar-fill"></div></div>
    </div>

    <div class="container" id="menu">
        <div class="game-card" onclick="checkLvl('math', 1)"> <span class="lvl-badge">LVL 1</span> ➕ <h3>Math</h3> </div>
        <div class="game-card" onclick="checkLvl('xo', 1)"> <span class="lvl-badge">LVL 1</span> ❌ <h3>X-O</h3> </div>
        <div class="game-card" onclick="checkLvl('tap', 2)"> <span class="lvl-badge">LVL 2</span> ⚡ <h3>Speed</h3> </div>
        <div class="game-card" onclick="checkLvl('num', 2)"> <span class="lvl-badge">LVL 2</span> 🔢 <h3>Numbers</h3> </div>
        <div class="game-card" onclick="checkLvl('ball', 3)"> <span class="lvl-badge">LVL 3</span> 👻 <h3>Ghost</h3> </div>
        <div class="game-card" onclick="checkLvl('mem', 3)"> <span class="lvl-badge">LVL 3</span> 🧠 <h3>Memory</h3> </div>
        <div class="game-card" onclick="checkLvl('war', 4)"> <span class="lvl-badge">LVL 4</span> 🔫 <h3>War Mode</h3> </div>
        <div class="game-card" onclick="checkLvl('3d', 5)"> <span class="lvl-badge">LVL 5</span> 🌌 <h3>3D Tunnel</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; left:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div id="game-timer-container"><div id="game-timer-fill"></div></div>
            
            <div id="result-overlay">
                <h1 id="res-msg"></h1>
                <p id="res-details"></p>
                <button class="btn" onclick="hideResult()">إعادة تحميل اللعبة 🔄</button>
            </div>
            <div id="game-view"></div>
        </div>
    </div>

    <script>
        let player = { lvl: 1, xp: 0, next: 100 };
        let timerInt, currentGame = '', gameTime = 0, initialTime = 0;

        function updateUI() {
            document.getElementById('current-lvl').innerText = player.lvl;
            document.getElementById('current-xp').innerText = player.xp;
            document.getElementById('xp-bar-fill').style.width = (player.xp / player.next * 100) + "%";
            const requirements = [1, 1, 2, 2, 3, 3, 4, 5];
            document.querySelectorAll('.game-card').forEach((card, i) => {
                player.lvl < requirements[i] ? card.classList.add('locked') : card.classList.remove('locked');
            });
        }

        function checkLvl(game, req) {
            if(player.lvl >= req) start(game);
            else { playSfx('fail'); alert("تحتاج للوصول لمستوى " + req); }
        }

        function start(m) {
            currentGame = m; clearInterval(timerInt);
            document.getElementById('gameModal').style.display="block";
            const v = document.getElementById('game-view'); v.innerHTML = '';
            
            // ضبط الوقت لكل لعبة
            if(m==='math') { initialTime = 10; loadMath(v); }
            else if(m==='war') { initialTime = 15; loadWar(v); }
            else if(m==='3d') { initialTime = 20; load3D(v); }
            else if(m==='ball') { initialTime = 15; loadBall(v); }
            else { initialTime = 15; v.innerHTML = `<h3>لعبة ${m}</h3><button class="btn" onclick="showResult('فوز','+35 XP',true)">فوز سريع</button>`; }
            
            startTimer();
        }

        function startTimer() {
            gameTime = initialTime;
            const bar = document.getElementById('game-timer-fill');
            const container = document.getElementById('game-timer-container');
            container.style.display = "block";
            bar.style.width = "100%";
            
            timerInt = setInterval(() => {
                gameTime--;
                bar.style.width = (gameTime / initialTime * 100) + "%";
                if(gameTime <= 0) {
                    clearInterval(timerInt);
                    showResult("انتهى الوقت", "حاول أن تكون أسرع!", false);
                }
            }, 1000);
        }

        function showResult(m, d, w) {
            clearInterval(timerInt);
            const o = document.getElementById('result-overlay');
            document.getElementById('res-msg').innerText = m;
            document.getElementById('res-details').innerText = d;
            o.style.display = 'flex';
            if(w) { playSfx('win'); player.xp += 35; if(player.xp>=100){player.lvl++; player.xp=0;} updateUI(); } 
            else playSfx('fail');
        }

        function hideResult() {
            document.getElementById('result-overlay').style.display = 'none';
            start(currentGame); // إعادة تحميل اللعبة الحالية تلقائياً
        }

        function stop() { clearInterval(timerInt); document.getElementById('gameModal').style.display="none"; }

        // --- محركات الألعاب ---
        function loadMath(v) {
            let a=Math.floor(Math.random()*20), b=Math.floor(Math.random()*20), r=a+b;
            v.innerHTML=`<h2>${a} + ${b} = ؟</h2><input type="number" id="ans" style="width:80%; padding:10px; font-size:20px; border-radius:10px;"><button class="btn" onclick="checkMath(${r})">تحقق</button>`;
        }
        window.checkMath = (r) => { if(parseInt(document.getElementById('ans').value)===r) showResult('صح!','+35 XP',true); else playSfx('fail'); };

        function loadWar(v) {
            let k=0; v.innerHTML=`<div id="arena"></div><p>القتلى: <span id="wk">0</span></p>`;
            const a=v.querySelector('#arena');
            function sp(){ if(currentGame!=='war'||gameTime<=0) return; const e=document.createElement('div'); e.className='enemy';
            e.style.left=Math.random()*80+"%"; e.style.top=Math.random()*70+"%"; a.appendChild(e);
            e.onclick=(ev)=>{ev.stopPropagation(); k++; playSfx('shoot'); document.getElementById('wk').innerText=k; e.remove(); if(k>=10) showResult('بطل!','تمت المهمة',true); else sp();};
            setTimeout(()=>{if(e.parentNode){e.remove(); sp();}}, 1000); }
            sp(); sp();
        }

        function load3D(v) {
            let s=0; v.innerHTML=`<div id="tunnel-container"></div><p>النقاط: <span id="s3">0</span></p>`;
            function sp(){ if(currentGame!=='3d'||gameTime<=0) return; const st=document.createElement('div'); st.className='star-3d'; 
            st.style.left=Math.random()*80+10+"%"; st.style.top=Math.random()*80+10+"%"; v.querySelector('#tunnel-container').appendChild(st);
            let a=st.animate([{transform:'scale(0) translateZ(-500px)',opacity:0},{transform:'scale(3) translateZ(200px)',opacity:1}],2000);
            st.onclick=()=>{s++; playSfx('pop'); document.getElementById('s3').innerText=s; st.remove(); if(s>=15) showResult('فوز!','خبير أبعاد',true); }; 
            a.onfinish=()=>{if(st.parentNode){st.remove(); sp();}}; }
            sp(); sp();
        }

        // --- نظام الصوت ---
        let ctx;
        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSfx(t) {
            if(!ctx) return; const o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination);
            if(t==='shoot'){ o.type='square'; o.frequency.value=150; g.gain.value=0.1; o.start(); o.stop(ctx.currentTime+0.1); }
            if(t==='pop'){ o.frequency.value=600; g.gain.value=0.1; o.start(); o.stop(ctx.currentTime+0.1); }
            if(t==='fail'){ o.type='sawtooth'; o.frequency.value=100; g.gain.value=0.1; o.start(); o.stop(ctx.currentTime+0.3); }
            if(t==='win'){ o.frequency.value=800; g.gain.value=0.1; o.start(); o.stop(ctx.currentTime+0.5); }
        }

        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA AI - STUDIO PRO</title>
    <style>
        :root { --primary: #0088ff; --secondary: #ff3333; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #111, #050505); }
        .header-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .header-box h1 { font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 140px; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: scale(1.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 5vh auto; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; min-height: 350px; }
        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        .win-text { color: #00ff88; font-size: 2rem; text-shadow: 0 0 20px #00ff88; }
        .lose-text { color: #ff3333; font-size: 2rem; text-shadow: 0 0 20px #ff3333; }
        .cell { background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; height: 60px; font-size: 25px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        #arena { height: 200px; background: #000; position: relative; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        #ball { width: 40px; height: 40px; background: yellow; border-radius: 50%; position: absolute; cursor: pointer; display: none; box-shadow: 0 0 20px yellow; z-index: 10; }
    </style>
</head>
<body onclick="initAudio()">
    <div class="bg-layer"></div>
    <div class="header-box">
        <h1>🎮 BRSMAYKA AI</h1>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('xo')"> ❌ <h3>X-O</h3> </div>
        <div class="game-card" onclick="start('ball')"> 👻 <h3>الشبح</h3> </div>
        <div class="game-card" onclick="start('mem')"> 🧠 <h3>الذاكرة</h3> </div>
        <div class="game-card" onclick="start('tap')"> ⚡ <h3>السرعة</h3> </div>
        <div class="game-card" onclick="start('math')"> ➕ <h3>الحساب</h3> </div>
        <div class="game-card" onclick="start('color')"> 🎨 <h3>الألوان</h3> </div>
        <div class="game-card" onclick="start('mine')"> 💣 <h3>الألغام</h3> </div>
        <div class="game-card" onclick="start('hit')"> 🎯 <h3>الهدف</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; left:20px; top:10px; font-size:35px; cursor:pointer; color:white; z-index:101;" onclick="stop()">&times;</span>
            <div id="result-overlay">
                <h1 id="result-msg"></h1>
                <p id="result-details" style="color:#aaa;"></p>
                <button class="btn" onclick="hideResult()">إعادة المحاولة 🔄</button>
            </div>
            <div id="game-view"></div>
        </div>
    </div>

    <script>
        let ctx, timerInt, ballLoop, currentGame = '';
        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        
        function sfx(f, d = 0.1) { 
            if(ctx) { 
                const o=ctx.createOscillator(), g=ctx.createGain(); 
                o.frequency.value=f; o.connect(g); g.connect(ctx.destination); 
                o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + d); 
                o.stop(ctx.currentTime + d); 
            } 
        }

        function winSnd() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => sfx(f, 0.2), i * 150)); }
        function loseSnd() { [392, 349, 311, 261].forEach((f, i) => setTimeout(() => sfx(f, 0.4), i * 200)); }

        function showResult(msg, details, isWin) {
            const overlay = document.getElementById('result-overlay');
            document.getElementById('result-msg').innerText = msg;
            document.getElementById('result-msg').className = isWin ? 'win-text' : 'lose-text';
            document.getElementById('result-details').innerText = details;
            overlay.style.display = 'flex';
            if(isWin) winSnd(); else loseSnd();
        }

        function hideResult() { 
            document.getElementById('result-overlay').style.display = 'none'; 
            start(currentGame); 
        }

        function start(m) {
            currentGame = m; 
            clearInterval(timerInt); 
            clearTimeout(ballLoop);
            document.getElementById('gameModal').style.display="block";
            const v = document.getElementById('game-view');
            v.innerHTML = '';
            if(m==='xo') loadXO(v);
            if(m==='ball') loadBall(v);
            if(m==='mem') loadMem(v);
            if(m==='tap') loadTap(v);
            if(m==='math') loadMath(v);
            if(m==='color') loadColor(v);
            if(m==='mine') loadMine(v);
            if(m==='hit') loadHit(v);
        }

        function stop() { 
            clearInterval(timerInt); 
            clearTimeout(ballLoop); 
            document.getElementById('gameModal').style.display="none"; 
            currentGame = '';
        }

        // --- 1. الحساب (Math) المصلح ---
        function loadMath(v) {
            let a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20), res = a+b, t = 10;
            v.innerHTML = `<h3>أسرع حساب!</h3><h1 id="mtm">10</h1><h2>${a} + ${b} = ?</h2>
                           <input type="number" id="ansIn" placeholder="الناتج" style="width:80%; padding:15px; border-radius:15px; border:none; text-align:center; font-size:22px; margin-bottom:10px;">
                           <button class="btn" id="chkM">تحقق ✅</button>`;
            const input = document.getElementById('ansIn');
            setTimeout(() => input.focus(), 100);
            timerInt = setInterval(() => { t--; document.getElementById('mtm').innerText = t; if(t<=0){ clearInterval(timerInt); showResult("انتهى الوقت! 🤖", `الصح هو ${res}`, false); } }, 1000);
            document.getElementById('chkM').onclick = () => {
                if(parseInt(input.value) === res) { clearInterval(timerInt); showResult("عبقري! 🎓", "إجابة صحيحة", true); }
                else { sfx(150, 0.3); input.value=""; input.placeholder="خطأ!"; }
            };
        }

        // --- 2. السرعة (Tap) المصلح ---
        function loadTap(v) {
            let c = 0, target = 25, timeLeft = 5, active = false;
            v.innerHTML = `<h3>السرعة (25)</h3><h1 id="tt">5</h1><button class="btn" id="tbb" style="height:100px;">إبدأ النقر!</button><h2>نقرات: <span id="cc">0</span></h2>`;
            const btn = document.getElementById('tbb');
            btn.onclick = () => {
                if(!active) {
                    active = true;
                    timerInt = setInterval(() => {
                        timeLeft--;
                        document.getElementById('tt').innerText = timeLeft;
                        if(timeLeft <= 0) { clearInterval(timerInt); btn.disabled = true; showResult(c>=target?"برق! ⚡":"بطيء! 🤖", `سجلت ${c} نقرة`, c>=target); }
                    }, 1000);
                }
                if(timeLeft > 0) { c++; document.getElementById('cc').innerText = c; sfx(500, 0.05); }
            };
        }

        // --- 3. الشبح (Ball) 20 نقطة ---
        function loadBall(v) {
            let p=0, r=0; v.innerHTML=`<h3>الشبح (20)</h3><div id="arena"><div id="ball"></div></div><h4 id="sc">أنت: 0 | الـ AI: 0</h4>`;
            const b=document.getElementById('ball');
            const mv=()=> { 
                if(currentGame!=='ball') return;
                b.style.display="block"; b.style.top=Math.random()*150+"px"; b.style.left=Math.random()*250+"px"; b.style.opacity="1"; 
                let hit=false; b.onclick=(e)=>{ e.stopPropagation(); hit=true; p++; sfx(800); upd(); b.style.display="none"; if(p<20) mv(); else showResult("بطل! 🏆", "هزمت الشبح", true); };
                setTimeout(()=>{ if(!hit && currentGame==='ball'){ r++; upd(); if(r>=20) showResult("خسرت! 👻", "الروبوت أسرع", false); else { b.style.opacity="0"; ballLoop=setTimeout(mv, 1000); } } }, 800);
            };
            const upd=()=>{ document.getElementById('sc').innerText=`أنت: ${p} | الـ AI: ${r}`; }; mv();
        }

        // --- 4. الذاكرة (Memory) ---
        function loadMem(v) {
            const icons=['🍎','🍎','🍌','🍌','🍇','🍇','🍒','🍒'];
            let s=icons.sort(()=>Math.random()-0.5), sel=[], err=0;
            v.innerHTML=`<h3>الذاكرة</h3><div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">${s.map(()=>`<div class="cell" onclick="memC(this)"></div>`).join('')}</div>`;
            window.memC=(el)=>{ if(sel.length<2 && !el.innerText){ el.innerText=s[[...el.parentNode.children].indexOf(el)]; sel.push(el); if(sel.length===2){ if(sel[0].innerText===sel[1].innerText){ sfx(700); sel=[]; if([...el.parentNode.children].every(x=>x.innerText)) showResult("ممتاز!", "", true); } else { sfx(150,0.3); setTimeout(()=>{sel[0].innerText=''; sel[1].innerText=''; sel=[]; err++; if(err>=5) showResult("فشل!", "ذاكرة ضعيفة", false);},500); } } } };
        }

        // --- 5. X-O ---
        function loadXO(v) {
            let b=["","","","","","","","",""], a=true;
            const draw=()=> { v.innerHTML=`<h3>X-O</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">${b.map((s,i)=>`<div class="cell" onclick="clickXO(${i})">${s}</div>`).join('')}</div>`; };
            window.clickXO=(i)=> { if(b[i]==="" && a) { b[i]="X"; sfx(600); if(!chk(b)) setTimeout(rob,400); draw(); } };
            const rob=()=> { let e=b.map((s,i)=>s===""?i:null).filter(v=>v!==null); if(e.length>0 && a){ b[e[Math.floor(Math.random()*e.length)]]="O"; sfx(400); chk(b); draw(); } };
            const chk=(x)=> { const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let p of w){ if(x[p[0]] && x[p[0]]===x[p[1]] && x[p[0]]===x[p[2]]){ a=false; showResult(x[p[0]]==="X"?"فزت! 🔥":"خسرت! 🤖", "", x[p[0]]==="X"); return true; } } if(!x.includes("")){ showResult("تعادل!", "", true); return true; } return false; };
            draw();
        }

        // --- 6. الألوان (Colors) ---
        function loadColor(v) {
            const names=["أحمر","أزرق","أخضر"], colors=["red","blue","green"];
            let idxN=Math.floor(Math.random()*3), idxC=Math.floor(Math.random()*3);
            v.innerHTML=`<h3>هل اللون متطابق؟</h3><h1 style="color:${colors[idxC]}">${names[idxN]}</h1><div style="display:flex; gap:10px;"><button class="btn" onclick="checkCol(true)">نعم</button><button class="btn" style="background:red" onclick="checkCol(false)">لا</button></div>`;
            window.checkCol=(ans)=>{ if((idxN===idxC)===ans) showResult("مركز! 🎨", "أصبت", true); else showResult("خسارة! 🤖", "خدعك اللون", false); };
        }

        // --- 7. الألغام (Mine) ---
        function loadMine(v) {
            let bomb=Math.floor(Math.random()*9), found=0;
            v.innerHTML=`<h3>تجنب اللغم!</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">${[0,1,2,3,4,5,6,7,8].map(i=>`<div class="cell" onclick="chkMine(${i}, this)">?</div>`).join('')}</div>`;
            window.chkMine=(i, el)=>{ if(i===bomb){ el.innerHTML="💣"; el.style.background="red"; showResult("انفجار!", "", false); } else if(el.innerHTML!=="💎"){ el.innerHTML="💎"; el.style.background="green"; found++; sfx(800); if(found===3) showResult("فزت! 🏆", "", true); } };
        }

        // --- 8. الهدف (Hit) ---
        function loadHit(v) {
            v.innerHTML=`<h3>إضغط عند الأخضر</h3><div id="arena" style="display:flex; align-items:center; justify-content:center;"><div id="box" style="width:80px; height:80px; background:red; border-radius:10px;"></div></div><button class="btn" onclick="chkH()">إضرب!</button>`;
            const box = document.getElementById('box'); let isG=false;
            const cycle=()=>{ if(currentGame!=='hit') return; setTimeout(()=>{ box.style.background="green"; isG=true; setTimeout(()=>{ if(isG){ box.style.background="red"; isG=false; cycle(); } }, 700); }, Math.random()*2000+1000); };
            window.chkH=()=>{ if(isG) showResult("قناص!", "", true); else showResult("فشل!", "", false); isG=false; };
            cycle();
        }
    </script>
</body>
</html>

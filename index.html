<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="مكتبة ألعاب BRSMAYKA - العب أفضل 20 لعبة مجاناً">
    <title>BRSMAYKA | عالم الألعاب</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">

    <style>
        /* نفس التصميم السابق الذي أعجبك */
        body { background-color: #050505; font-family: 'Segoe UI', sans-serif; text-align: center; color: white; margin: 0; }
        #online-counter { position: fixed; top: 15px; right: 15px; background: rgba(0, 212, 255, 0.2); border: 1px solid #00d4ff; padding: 8px 15px; border-radius: 25px; font-size: 14px; color: #00d4ff; z-index: 1000; }
        .container { background: #111; padding: 30px; border-radius: 30px; border: 2px solid #00d4ff; max-width: 1100px; width: 95%; margin: 50px auto; }
        #entry-btn { background: linear-gradient(45deg, #00d4ff, #0055ff); color: white; border: none; padding: 20px 60px; border-radius: 50px; font-size: 26px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .game-grid { display: none; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .game-card { background: #1a1a1a; border-radius: 20px; padding: 20px; text-decoration: none; color: white; border: 1px solid #333; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .game-card:hover { border-color: #00d4ff; transform: scale(1.08); background: #222; }
        .emoji { font-size: 50px; }
    </style>
</head>
<body>

    <div id="online-counter">المتصلون الآن: <span id="user-count">1,500</span></div>

    <audio id="hover-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div class="container">
        <div id="welcome-section">
            <h1>BRSMAYKA 🎮</h1>
            <button id="entry-btn" onclick="openGames()">اضغط الآن للعب</button>
        </div>
        <div id="game-grid" class="game-grid">
            <a href="https://poki.com/en/g/subway-surfers" target="_blank" class="game-card" onmouseover="playHover()"><div class="emoji">🏃‍♂️</div><div class="game-name">Subway Surfers</div></a>
            </div>
    </div>

    <script>
        function updateCounter() { document.getElementById('user-count').innerText = (1500 + Math.floor(Math.random() * 50)).toLocaleString(); }
        setInterval(updateCounter, 3000);
        function playHover() { document.getElementById("hover-sound").currentTime = 0; document.getElementById("hover-sound").play().catch(e=>{}); }
        function playClick() { document.getElementById("click-sound").play(); }
        function openGames() { playClick(); document.getElementById('welcome-section').style.display = 'none'; document.getElementById('game-grid').style.display = 'grid'; }
    </script>
</body>
</html>

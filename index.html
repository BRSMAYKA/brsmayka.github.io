<!DOCTYPE html>
<html lang="en" dir="ltr">
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING - Audio & Timer Edition</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff3366; --bg: #0a0a0a; --accent-green: #00ff44; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; font-weight: 900; }

        #splash-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 30000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #persistent-score {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green);
            padding: 10px; border-radius: 8px; z-index: 10001;
        }

        #visitor-counter-box {
            margin: 10px auto; background: rgba(255, 255, 255, 0.05);
            padding: 10px; display: inline-block; border-radius: 10px; border: 1px dashed #333;
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            20% { transform: translate(-3px, -2px); }
            40% { transform: translate(3px, 2px); }
            60% { transform: translate(-2px, 1px); }
            100% { transform: translate(0, 0); }
        }
        .shake-fx { animation: shake 0.4s both; border-color: var(--secondary) !important; }
        .win-fx { box-shadow: 0 0 50px var(--accent-green) !important; border-color: var(--accent-green) !important; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #333; width: 145px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; transition: 0.3s; }
        
        #custom-result-overlay {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 23px; padding: 20px;
        }

        #timer-container { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        #timer-bar-container { flex-grow: 1; height: 8px; background: #222; border-radius: 10px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: var(--accent-green); transition: 0.1s linear; }
        #timer-text { font-family: monospace; color: var(--accent-green); font-weight: bold; min-width: 45px; }

        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        .cell { background: #161616; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 75px; width: 75px; font-size: 32px; border: 1px solid #333; cursor: pointer; color: var(--accent-green); }
        
        .lvl-btn { padding: 6px 12px; font-size: 11px; cursor: pointer; border-radius: 5px; border: 1px solid var(--primary); background: transparent; color: white; }
        .lvl-btn.active { background: var(--accent-green); color: black; }
    </style>
</head>
<body onload="loadGlobalScore()">

    <div id="splash-screen">
        <h1 class="brand-name">BRSMAYKA OS</h1>
        <button class="btn" style="width:200px" onclick="bootSystem()">ENTER SYSTEM</button>
    </div>

    <div id="persistent-score">Points: <span id="total-points">0</span></div>

    <h1 class="brand-name">BRSMAYKA GAMING</h1>

    <div id="visitor-counter-box">
        <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
        <script type="text/javascript" src="https://counter1.optistats.ovh/private/counter.js?c=j1hadcun8xqdfhbzttteef2bq7wl376p&down=async" async></script>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="start('math')">➗ <h3>Math</h3></div>
        <div class="game-card" onclick="start('mem')">🧠 <h3>Memory</h3></div>
        <div class="game-card" onclick="start('ball')">👻 <h3>Ghost</h3></div>
        <div class="game-card" onclick="start('tap')">⚡ <h3>Tap</h3></div>
    </div>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            
            <div id="timer-container">
                <div id="timer-bar-container"><div id="timer-bar"></div></div>
                <div id="timer-text">0.0s</div>
            </div>

            <div id="game-view"></div>

            <div id="custom-result-overlay">
                <h1 id="res-title" style="font-size: 2.5rem;"></h1>
                <p id="res-desc" style="margin-bottom: 20px;"></p>
                <button class="btn" onclick="hideResult()">PLAY AGAIN</button>
                <button class="btn" style="background:#333; color:white;" onclick="stop()">QUIT</button>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, currentMode, score = 0, gameTimer, timeLeft, totalTime, globalPoints = 0;
        let board = [], canPlay = true, difficulty = 'hard';

        // دالة توليد الأصوات (الطقطقة)
        function playSfx(f, type, vol, dur) {
            if(!audioCtx) return;
            try {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.type = type;
                o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(vol, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                o.connect(g);
                g.connect(audioCtx.destination);
                o.start();
                o.stop(audioCtx.currentTime + dur);
            } catch(e) { console.log("Audio Error"); }
        }

        function bootSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // طقطقة الدخول
            [311, 466, 622, 932].forEach((f, i) => { 
                setTimeout(() => playSfx(f, 'sine', 0.1, 0.4), i * 150); 
            });
            document.getElementById('splash-screen').style.display = 'none';
        }

        function loadGlobalScore() {
            globalPoints = parseInt(localStorage.getItem('brs_gaming_score')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
        }

        function showResult(title, desc, isWin) {
            clearInterval(gameTimer);
            const overlay = document.getElementById('custom-result-overlay');
            const box = document.getElementById('game-box');
            const titleEl = document.getElementById('res-title');
            
            titleEl.innerText = title;
            document.getElementById('res-desc').innerText = desc;
            
            if(isWin) {
                titleEl.style.color = "var(--accent-green)";
                box.classList.add('win-fx');
                playSfx(523, 'sine', 0.1, 0.5); // صوت فوز
                globalPoints += 50;
            } else {
                titleEl.style.color = "var(--secondary)";
                box.classList.add('shake-fx');
                playSfx(110, 'sawtooth', 0.15, 0.5); // صوت خسارة
            }

            localStorage.setItem('brs_gaming_score', globalPoints);
            document.getElementById('total-points').innerText = globalPoints;
            overlay.style.display = 'flex';
        }

        function hideResult() { 
            playSfx(800, 'sine', 0.05, 0.1); // طقطقة زر
            document.getElementById('game-box').classList.remove('win-fx', 'shake-fx');
            document.getElementById('custom-result-overlay').style.display = 'none'; 
            start(currentMode); 
        }

        function stop() { 
            playSfx(200, 'sine', 0.05, 0.1); // طقطقة إغلاق
            clearInterval(gameTimer);
            document.getElementById('game-box').classList.remove('win-fx', 'shake-fx');
            document.getElementById('gameModal').style.display = 'none'; 
        }

        function start(mode) {
            playSfx(600, 'sine', 0.05, 0.1); // طقطقة بدء اللعبة
            currentMode = mode; score = 0; canPlay = true; board = Array(9).fill('');
            document.getElementById('gameModal').style.display = 'block';
            document.getElementById('custom-result-overlay').style.display = 'none';
            const view = document.getElementById('game-view');
            view.innerHTML = '';

            totalTime = (mode === 'math' ? 6 : mode === 'tap' ? 12 : 20);
            timeLeft = totalTime;

            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                if(timeLeft <= 0) { timeLeft = 0; showResult('TIME OVER', 'Too slow!', false); }
                document.getElementById('timer-bar').style.width = (timeLeft/totalTime)*100 + '%';
                document.getElementById('timer-text').innerText = timeLeft.toFixed(1) + 's';
            }, 100);

            if(mode === 'xo') {
                view.innerHTML = `
                    <div style="margin-bottom:10px; display:flex; gap:5px; justify-content:center;">
                        <button class="lvl-btn ${difficulty==='easy'?'active':''}" onclick="difficulty='easy'; start('xo')">Easy</button>
                        <button class="lvl-btn ${difficulty==='med'?'active':''}" onclick="difficulty='med'; start('xo')">Med</button>
                        <button class="lvl-btn ${difficulty==='hard'?'active':''}" onclick="difficulty='hard'; start('xo')">Hard</button>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(3,75px); gap:8px; justify-content:center;"></div>`;
                for(let i=0; i<9; i++) {
                    const c = document.createElement('div'); c.className = 'cell'; c.id = 'c'+i;
                    c.onclick = () => { 
                        if(canPlay && board[i] === '') { 
                            playSfx(1000, 'sine', 0.05, 0.05); // طقطقة الضغط على المربع
                            board[i] = 'X'; c.innerText = 'X'; 
                            if(!checkXO()) { canPlay = false; setTimeout(aiMove, 500); } 
                        } 
                    };
                    view.lastChild.appendChild(c);
                }
            } else if(mode === 'math') {
                const a = Math.floor(Math.random()*30), b = Math.floor(Math.random()*30), ans = a+b;
                view.innerHTML = `<h1 style="font-size:3rem; margin:20px 0;">${a} + ${b}</h1>`;
                [ans, ans+4, ans-2].sort(()=>Math.random()-0.5).forEach(o => {
                    const btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = o;
                    btn.onclick = () => { playSfx(1000, 'sine', 0.05, 0.05); o === ans ? showResult('CORRECT!', '+50 Points', true) : showResult('WRONG!', 'Try again!', false); };
                    view.appendChild(btn);
                });
            } else if(mode === 'tap') {
                view.innerHTML = `<h2>TAP 30x!</h2><button id="tap-btn" class="btn" style="height:120px; font-size:45px;" onclick="score++; this.innerText=score; playSfx(1200, 'sine', 0.03, 0.05); if(score>=30) showResult('VICTORY','Ultra Speed!',true)">0</button>`;
            } else if(mode === 'ball') {
                view.innerHTML = `<div style="height:250px; position:relative; background:#050505; border-radius:15px; overflow:hidden;"><div id="ghost" style="position:absolute; font-size:45px; cursor:pointer;" onclick="score++; playSfx(1500, 'sine', 0.05, 0.05); this.style.left=Math.random()*85+'%'; this.style.top=Math.random()*85+'%'; if(score>=10) showResult('WINNER','Ghost Hunter!',true)">👻</div></div>`;
            } else if(mode === 'mem') {
                const icons = ['🔥','🔥','💎','💎','⚡','⚡','🍒','🍒','🍀','🍀','⭐','⭐'].sort(()=>Math.random()-0.5);
                view.innerHTML = `<div style="display:grid; grid-template-columns:repeat(4,70px); gap:8px; justify-content:center;"></div>`;
                let flipped = [];
                icons.forEach(icon => {
                    const c = document.createElement('div'); c.className = 'cell'; c.innerText = '?';
                    c.onclick = () => {
                        if(flipped.length<2 && c.innerText=='?') {
                            playSfx(1000, 'sine', 0.05, 0.05);
                            c.innerText = icon; flipped.push({el:c, val:icon});
                            if(flipped.length===2) {
                                if(flipped[0].val===flipped[1].val) { score++; flipped=[]; if(score===6) showResult('PERFECT','Memory Master!',true); }
                                else { setTimeout(()=>{ flipped.forEach(f=>f.el.innerText='?'); flipped=[]; }, 500); }
                            }
                        }
                    };
                    view.lastChild.appendChild(c);
                });
            }
        }

        function checkXO() {
            if(checkWin(board, 'X')) { showResult('VICTORY', 'You beat the AI!', true); return true; }
            if(!board.includes('')) { showResult('DRAW', 'No one wins', true); return true; }
            return false;
        }

        function aiMove() {
            let move;
            if(difficulty === 'easy') move = getRandomMove();
            else if(difficulty === 'med') move = Math.random() > 0.5 ? minimax(board, 'O').index : getRandomMove();
            else move = minimax(board, 'O').index;
            if(move === undefined) return;
            board[move] = 'O';
            playSfx(400, 'sine', 0.05, 0.1); // طقطقة حركة الروبوت
            document.getElementById('c'+move).innerText = 'O';
            document.getElementById('c'+move).style.color = 'var(--secondary)';
            if(checkWin(board, 'O')) showResult('DEFEAT', 'AI is too smart!', false);
            else if(!board.includes('')) showResult('DRAW', 'Fair game', true);
            else canPlay = true;
        }

        function getRandomMove() {
            let empty = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            return empty[Math.floor(Math.random() * empty.length)];
        }

        function checkWin(b, p) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(s => s.every(i => b[i] === p));
        }

        function minimax(newBoard, player) {
            let avail = newBoard.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            if(checkWin(newBoard, 'X')) return {score: -10};
            if(checkWin(newBoard, 'O')) return {score: 10};
            if(avail.length === 0) return {score: 0};
            let moves = [];
            for(let i=0; i<avail.length; i++) {
                let move = {}; move.index = avail[i];
                newBoard[avail[i]] = player;
                if(player === 'O') move.score = minimax(newBoard, 'X').score;
                else move.score = minimax(newBoard, 'O').score;
                newBoard[avail[i]] = '';
                moves.push(move);
            }
            let bestMove;
            if(player === 'O') {
                let bestScore = -Infinity;
                for(let i=0; i<moves.length; i++) { if(moves[i].score > bestScore) { bestScore = moves[i].score; bestMove = i; } }
            } else {
                let bestScore = Infinity;
                for(let i=0; i<moves.length; i++) { if(moves[i].score < bestScore) { bestScore = moves[i].score; bestMove = i; } }
            }
            return moves[bestMove];
     <script>

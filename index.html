<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE FIRE 3D - ALOK EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --ff-orange: #ff6a00;
            --ff-yellow: #ffb700;
            --ff-dark: #07090e;
            --ff-neon: #00ffcc;
        }

        * { box-sizing: border-box; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: var(--ff-dark); color: #fff; height: 100%; }

        /* شاشة التحميل الذكية */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo { font-size: 3rem; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 20px var(--ff-orange); }

        /* واجهة اللوبي (Lobby) */
        #lobby {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; pointer-events: none; /* للسماح بالتحكم بالخلفية الـ 3D */
        }
        .interactive { pointer-events: auto; } /* تفعيل الضغط لعناصر الواجهة فقط */

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 15px;
            border: 1px solid var(--ff-orange);
        }
        .res-box { display: flex; gap: 15px; font-weight: bold; }

        .lobby-ui { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }

        /* زر START الفخم */
        .start-btn {
            background: linear-gradient(135deg, #ff4500, #ff8c00); color: #fff;
            border: 2px solid var(--ff-yellow); padding: 15px 50px; font-size: 1.8rem;
            font-weight: 900; border-radius: 12px; cursor: pointer; box-shadow: 0 0 25px var(--ff-orange);
        }
        .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px var(--ff-yellow); }

        .btn-menu {
            background: #1f2833; color: white; border: 1px solid #444;
            padding: 12px 25px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 5px;
        }
        .btn-menu:hover { background: var(--ff-orange); }

        /* شاشة المعركة والـ HUD */
        #game-hud {
            display: none; position: absolute; top: 20px; left: 20px; right: 20px; z-index: 20;
            justify-content: space-between; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px;
        }

        /* حاوية العرض ثلاثية الأبعاد (Three.js Canvas) */
        #c3d-container { position: absolute; inset: 0; z-index: 1; }

        /* النوافذ المنبثقة */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content { background: #141923; border: 2px solid var(--ff-orange); padding: 25px; border-radius: 20px; width: 80%; max-width: 500px; text-align: center; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="logo">FREE FIRE 3D</div>
        <div style="color: var(--ff-yellow); margin-top: 10px;">جاري بناء البيئة والمجسمات ثلاثية الأبعاد...</div>
    </div>

    <div id="c3d-container"></div>

    <div id="lobby">
        <div class="top-bar interactive">
            <div>
                <div style="font-weight: bold; color: var(--ff-yellow);">الشخصية النشطة: <span style="color: #fff;">ألوك (Alok 3D)</span></div>
                <div style="font-size: 12px; color: #aaa;">المستوى الأسطوري: 5</div>
            </div>
            <div class="res-box">
                <div>🪙 <span id="gold-txt">3000</span></div>
                <div>💎 <span id="dia-txt">150</span></div>
            </div>
        </div>

        <div class="lobby-ui">
            <div class="interactive">
                <button class="btn-menu" onclick="openShop()">🏪 متجر سكنات الأسلحة</button>
            </div>
            <div class="interactive">
                <button class="start-btn" onclick="start3DMatch()">إبدأ المعركة</button>
            </div>
        </div>
    </div>

    <div id="game-hud">
        <div style="font-size: 1.2rem;">القتلات: <span id="kills-txt" style="color: red; font-weight: bold;">0</span> / 7</div>
        <div style="color: var(--ff-yellow); font-size: 1.2rem;">الوقت: <span id="timer-txt">25</span> ثانية</div>
        <div style="color: var(--ff-neon);">انقر مباشرة على المجسمات الحمراء لتصفيتها!</div>
    </div>

    <div id="shopModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--ff-yellow);">خزنة الأسلحة المطورة</h3>
            <p>سكن MP40 Cobra الأسطوري يعطيك ضرر مضاعف في الساحة الـ 3D!</p>
            <button class="btn-menu" style="width: 100%; background: var(--ff-orange);" onclick="buySkin()">شراء الآن بقيمة 1000 🪙</button>
            <button class="btn-menu" style="width: 100%; margin-top: 10px;" onclick="closeShop()">إغلاق</button>
        </div>
    </div>

    <script>
        // إعداد متغيرات محرك Three.js الأساسية (المشهد، الكاميرا، المخرج)
        let scene, camera, renderer;
        let alokMesh, enemies = [];
        let isPlaying = false, kills = 0, timeLeft = 25, gameTimer;
        let damageMultiplier = 1;

        // دالة بناء العالم ثلاثي الأبعاد بالكامل فور فتح الصفحة
        function init3DEngine() {
            const container = document.getElementById('c3d-container');
            
            // 1. إنشاء المشهد (Scene)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0c101b);
            scene.fog = new THREE.FogExp2(0x0c101b, 0.015); // إضافة تأثير ضبابي واقعي

            // 2. إعداد الكاميرا (Camera) بمجال رؤية واسع
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 7);

            // 3. إعداد وحدة الرندر وإخراج الجرافيكس (Renderer)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // 4. إضافة الإضاءة (Lights) لإضفاء الواقعية والتوهج
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffaa00, 1.2);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // 5. بناء أرضية اللوبي والميدان (The Floor Mesh)
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111625, roughness: 0.4 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -1;
            scene.add(floor);

            // 6. بناء مجسم يعبر عن بطل اللعبة "ألوك" (Alok Cyber Mesh) باستخدام تركيبات هندسية متطورة
            const alokGroup = new THREE.Group();
            
            // تصميم الجسد والأكتاف باللون الأسود والأزرق النيون المميز لألوك
            const bodyGeo = new THREE.CylinderGeometry(0.6, 0.4, 2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1f2833, metalness: 0.8 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            alokGroup.add(body);

            // الرأس والخلفية المتوهجة لهالة ألوك النشطة (Drop the Beat!)
            const headGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.4;
            alokGroup.add(head);

            // نظارات ألوك والوشاح المضيء
            const glassGeo = new THREE.BoxGeometry(0.6, 0.15, 0.4);
            const glassMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
            const glasses = new THREE.Mesh(glassGeo, glassMat);
            glasses.position.set(0, 1.45, 0.25);
            alokGroup.add(glasses);

            // هالة الدائرة النيونية أسفل الشخصية الخاصة بمهارة ألوك الشفائية
            const auraGeo = new THREE.RingGeometry(1.2, 1.3, 32);
            const auraMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, side: THREE.DoubleSide });
            const aura = new THREE.Mesh(auraGeo, auraMat);
            aura.rotation.x = Math.PI / 2;
            aura.position.y = -0.9;
            alokGroup.add(aura);

            alokMesh = alokGroup;
            scene.add(alokMesh);

            // إخفاء شاشة التحميل وبدء حلقة الأنيميشن اللامتناهية
            document.getElementById('loading-screen').style.display = 'none';
            animate();
        }

        // حلقة التحديث المستمر للـ 3D وإعادة الرسم (Game Loop)
        function animate() {
            requestAnimationFrame(animate);

            // جعل شخصية ألوك تدور ببطء وتتفاعل في اللوبي لخلق روح للموقع
            if(!isPlaying && alokMesh) {
                alokMesh.rotation.y += 0.01;
            }

            // تدوير وحركة الأعداء داخل الميدان أثناء القتال
            if(isPlaying) {
                enemies.forEach(enemy => {
                    enemy.rotation.x += 0.02;
                    enemy.rotation.y += 0.02;
                });
            }

            renderer.render(scene, camera);
        }

        // الانتقال من وضع اللوبي إلى ساحة المعركة ثلاثية الأبعاد الحية
        function start3DMatch() {
            isPlaying = true;
            kills = 0;
            timeLeft = 25;
            document.getElementById('kills-txt').innerText = kills;
            document.getElementById('timer-txt').innerText = timeLeft;

            // إخفاء شخصية ألوك مؤقتاً والواجهة الخاصة باللوبي والدخول للميدان
            alokMesh.position.set(0, -10, 0); 
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-hud').style.display = 'flex';

            // توليد الأهداف ثلاثية الأبعاد (Enemies Cubes) في الفضاء المحيط بالكاميرا
            generate3DEnemies();

            // بدء مؤقت المباراة العكسي
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-txt').innerText = timeLeft;
                if(timeLeft <= 0) end3DMatch(false);
            }, 1000);
        }

        // دالة توليد الأعداء كمجسمات ثلاثية الأبعاد حمراء متوهجة في الفضاء
        function generate3DEnemies() {
            // تنظيف أي مجسمات قديمة أولاً
            enemies.forEach(e => scene.remove(e));
            enemies = [];

            for (let i = 0; i < 7; i++) {
                const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0xff3333, 
                    emissive: 0x330000,
                    roughness: 0.2 
                });
                const mesh = new THREE.Mesh(geo, mat);

                // توزيع الأعداء عشوائياً في عمق الساحة وأمام الكاميرا
                mesh.position.x = (Math.random() * 6) - 3;
                mesh.position.y = (Math.random() * 3) + 0.5;
                mesh.position.z = (Math.random() * -5) - 1; // خلف خط الكاميرا لتسهيل القنص

                scene.add(mesh);
                enemies.push(mesh);
            }
        }

        // رصد عملية إطلاق النار والتصويب على الأجسام الـ 3D عبر الماوس أو اللمس (Raycasting)
        window.addEventListener('pointerdown', (event) => {
            if (!isPlaying) return;

            // تحويل إحداثيات الشاشة ثنائية الأبعاد إلى فضاء ثلاثي الأبعاد متوافق مع الكاميرا
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            // التحقق من تقاطع خط الإطلاق مع مجسمات الأعداء
            const intersects = raycaster.intersectObjects(enemies);

            if (intersects.length > 0) {
                const hitEnemy = intersects[0].object;
                
                // إزالة العدو المصاب فوراً من المشهد والمصفوفة بنجاح
                scene.remove(hitEnemy);
                enemies = enemies.filter(e => e !== hitEnemy);
                
                kills++;
                document.getElementById('kills-txt').innerText = kills;

                // التحقق من تحقيق الـ Booyah وتصفية الميدان بالكامل
                if (enemies.length === 0 || kills >= 7) {
                    end3DMatch(true);
                }
            }
        });

        // إنهاء المعركة وتوزيع مكافآت الذهب والجواهر حسب الأداء
        function end3DMatch(isWin) {
            isPlaying = false;
            clearInterval(gameTimer);
            
            // تنظيف الساحة وإعادة البطل ألوك إلى مكانه الأصلي في اللوبي
            enemies.forEach(e => scene.remove(e));
            enemies = [];
            alokMesh.position.set(0, 0, 0);

            document.getElementById('game-hud').style.display = 'none';
            document.getElementById('lobby').style.display = 'flex';

            if(isWin) {
                alert('BOOYAH! 🔥 لقد قمت بتصفية كافة الأهداف والمجسمات بنجاح تام! الميكانيكا لديك ممتازة.');
                let currentGold = parseInt(document.getElementById('gold-txt').innerText);
                document.getElementById('gold-txt').innerText = currentGold + 600;
            } else {
                alert('انتهى الوقت! الأهداف كانت أسرع منك، حاول التركيز وسرعة الضغط بالمرة القادمة.');
            }
        }

        // دوال النوافذ والتحكم بالمتجر
        function openShop() { document.getElementById('shopModal').style.display = 'flex'; }
        function closeShop() { document.getElementById('shopModal').style.display = 'none'; }
        function buySkin() {
            let gold = parseInt(document.getElementById('gold-txt').innerText);
            if(gold >= 1000) {
                document.getElementById('gold-txt').innerText = gold - 1000;
                damageMultiplier = 2;
                alert('تم شراء وتجهيز سكن كوبرا! الضرر لديك تضاعف الآن داخل الساحة الـ 3D.');
                closeShop();
            } else {
                alert('الذهب غير كافٍ، العب مباريات أكثر لتجميعه!');
            }
        }

        // إعادة ضبط أبعاد الرندر في حال تم تغيير حجم متصفح الويب أو شاشة الجوال
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // تشغيل المحرك تلقائياً عند فتح الصفحة
        window.onload = init3DEngine;
    </script>
</body>
</html>

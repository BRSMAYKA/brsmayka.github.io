<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA AI - Rocket Edition</title>
    <style>
        :root { --primary: #0088ff; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #111, #050505); }
        
        /* القسم العلوي المحدث بالصواريخ */
        .header-box { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 35px; padding: 10px; }
        .header-box h1 { font-size: 2rem; color: var(--primary); text-shadow: 0 0 20px var(--primary); margin: 0; letter-spacing: 2px; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 150px; border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(0, 136, 255, 0.1); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 10vh auto; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--primary); background: #222; color: white; text-align: center; font-size: 20px; margin-bottom: 10px; }
    </style>
</head>
<body onclick="initAudio()">
    <div class="bg-layer"></div>
    
    <div class="header-box">
        <span style="font-size: 2.5rem;">🚀</span>
        <h1>BRSMAYKA AI</h1>
        <span style="font-size: 2.5rem;">🚀</span>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('math')"> ➕ <h3>الحساب</h3> </div>
        <div class="game-card" onclick="start('ball')"> 👻 <h3>الشبح</h3> </div>
        <div class="game-card" onclick="start('tap')"> ⚡ <h3>السرعة</h3> </div>
        <div class="game-card" onclick="start('mem')"> 🧠 <h3>الذاكرة</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; left:20px; top:10px; font-size:30px; cursor:pointer; color:white; z-index:102;" onclick="stop()">&times;</span>
            <div id="result-overlay">
                <h1 id="result-msg"></h1>
                <p id="result-details" style="color:#aaa;"></p>
                <button class="btn" onclick="hideResult()">إعادة المحاولة 🔄</button>
            </div>
            <div id="game-view"></div>
        </div>
    </div>

    <script>
        let ctx, timerInt, ballLoop, currentGame = '';
        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        function sfx(f, d = 0.1) { if(ctx) { const o=ctx.createOscillator(), g=ctx.createGain(); o.frequency.value=f; o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + d); o.stop(ctx.currentTime + d); } }
        
        function showResult(msg, det, win) {
            const ov = document.getElementById('result-overlay');
            document.getElementById('result-msg').innerText = msg;
            document.getElementById('result-msg').style.color = win ? "#00ff88" : "#ff3333";
            document.getElementById('result-details').innerText = det;
            ov.style.display = 'flex';
        }

        function start(m) {
            currentGame = m; clearInterval(timerInt);
            document.getElementById('gameModal').style.display="block";
            const v = document.getElementById('game-view');
            if(m==='math') loadMath(v);
            if(m==='ball') loadBall(v);
            if(m==='tap') loadTap(v);
            if(m==='mem') loadMem(v);
        }

        function stop() { clearInterval(timerInt); clearTimeout(ballLoop); document.getElementById('gameModal').style.display="none"; }
        function hideResult() { document.getElementById('result-overlay').style.display = 'none'; start(currentGame); }

        // --- لعبة الحساب المصلحة تماماً ---
        function loadMath(v) {
            let a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20), res = a+b, t = 10;
            v.innerHTML = `<h3>أسرع حساب!</h3><h1 id="mtm">10</h1><h2>${a} + ${b} = ؟</h2>
            <input type="number" id="ansInp" placeholder="ادخل الناتج">
            <button class="btn" id="chkBtn">تحقق ✅</button>`;
            
            const inp = document.getElementById('ansInp');
            const btn = document.getElementById('chkBtn');
            setTimeout(() => inp.focus(), 100);

            timerInt = setInterval(() => {
                t--; document.getElementById('mtm').innerText = t;
                if(t <= 0) { clearInterval(timerInt); showResult("انتهى الوقت!", `الناتج هو ${res}`, false); }
            }, 1000);

            btn.onclick = () => {
                if(parseInt(inp.value) === res) { clearInterval(timerInt); showResult("بطل!", "إجابة صحيحة", true); }
                else { sfx(150, 0.5); inp.value=""; inp.placeholder="خطأ! حاول ثانية"; }
            };
        }

        // الألعاب الأخرى تضاف هنا بنفس النمط...
    </script>
</body>
</html>

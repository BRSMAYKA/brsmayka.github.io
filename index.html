<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA - النسخة العملاقة</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #161616; --accent: #ff7300; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .header { margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 1000px; margin: auto; }

        /* تصميم الكروت */
        .game-card {
            background: var(--card); border: 2px solid #333; width: 180px; border-radius: 15px;
            padding: 20px; cursor: pointer; transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,255,204,0.1); }
        .game-icon { font-size: 40px; margin-bottom: 10px; }
        .play-btn { background: var(--primary); border: none; padding: 8px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; }

        /* نافذة اللعب */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding-top: 30px; }
        .modal-content { background: #1a1a1a; margin: auto; width: 90%; max-width: 450px; padding: 25px; border-radius: 20px; border: 2px solid var(--primary); position: relative; }
        .close { position: absolute; left: 15px; top: 10px; font-size: 30px; cursor: pointer; color: #888; }

        /* أنماط الألعاب الجديدة */
        #game-screen { min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .memory-card { width: 60px; height: 60px; background: #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; }
        
        #dodge-area { width: 100%; height: 200px; background: #000; position: relative; overflow: hidden; border: 1px solid #444; }
        #player-box { width: 30px; height: 30px; background: var(--primary); position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); transition: 0.1s; }
        .enemy { width: 20px; height: 20px; background: red; position: absolute; border-radius: 50%; }

        .xo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .cell { width: 70px; height: 70px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; cursor: pointer; border-radius: 10px; }
        
        .reset-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px; display: none; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="header">
        <h1 style="color: var(--primary);">🎮 ستوديو ألعاب BRSMAYKA المطور</h1>
        <p>مكتبة تضم 5 ألعاب احترافية</p>
    </div>

    <div class="container">
        <div class="game-card" onclick="openGame('xo')"> <div class="game-icon">🤖</div> <h3>X-O الذكية</h3> <button class="play-btn">العب</button> </div>
        <div class="game-card" onclick="openGame('ball')"> <div class="game-icon">🎾</div> <h3>صيد الكرة</h3> <button class="play-btn">العب</button> </div>
        
        <div class="game-card" onclick="openGame('memory')"> <div class="game-icon">🧠</div> <h3>الذاكرة</h3> <button class="play-btn">العب</button> </div>
        <div class="game-card" onclick="openGame('dodge')"> <div class="game-icon">🚀</div> <h3>تفادي الهجوم</h3> <button class="play-btn">العب</button> </div>
        <div class="game-card" onclick="openGame('fast')"> <div class="game-icon">⚡</div> <h3>النقر السريع</h3> <button class="play-btn">العب</button> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <div id="game-screen"></div>
            <button id="resetBtn" class="reset-btn">إعادة المحاولة 🔄</button>
        </div>
    </div>

<script>
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(f) { if(audioCtx) { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1); o.stop(audioCtx.currentTime + 0.1); } }

    function openGame(g) {
        document.getElementById('gameModal').style.display = "block";
        document.getElementById('resetBtn').style.display = "none";
        if(g === 'xo') loadXO();
        if(g === 'ball') startBallGame();
        if(g === 'memory') loadMemory();
        if(g === 'dodge') loadDodge();
        if(g === 'fast') loadFastClick();
    }

    // --- 1. لعبة الذاكرة ---
    function loadMemory() {
        const icons = ['🍎','🍎','🍌','🍌','💎','💎','🚀','🚀','⭐','⭐','👻','👻'];
        const shuffled = icons.sort(() => Math.random() - 0.5);
        let selected = [];
        const screen = document.getElementById('game-screen');
        screen.innerHTML = `<h3>طابق الصور المتشابهة!</h3><div class="memory-grid"></div>`;
        const grid = screen.querySelector('.memory-grid');
        shuffled.forEach((icon, i) => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.icon = icon;
            card.onclick = function() {
                if(selected.length < 2 && !this.innerText) {
                    this.innerText = this.dataset.icon;
                    selected.push(this);
                    if(selected.length === 2) {
                        if(selected[0].dataset.icon === selected[1].dataset.icon) {
                            playSound(800); selected = [];
                        } else {
                            setTimeout(() => { selected[0].innerText = ''; selected[1].innerText = ''; selected = []; }, 500);
                        }
                    }
                }
            };
            grid.appendChild(card);
        });
    }

    // --- 2. لعبة تفادي العوائق ---
    let dodgeInterval;
    function loadDodge() {
        const screen = document.getElementById('game-screen');
        screen.innerHTML = `<h3>استخدم الأسهم أو الماوس للتفادي!</h3><div id="dodge-area"><div id="player-box"></div></div>`;
        const area = document.getElementById('dodge-area');
        const player = document.getElementById('player-box');
        let px = 50;
        
        // تحريك بالماوس/اللمس
        area.onmousemove = (e) => { 
            let rect = area.getBoundingClientRect();
            px = ((e.clientX - rect.left) / rect.width) * 100;
            player.style.left = px + "%";
        };

        dodgeInterval = setInterval(() => {
            const enemy = document.createElement('div');
            enemy.className = 'enemy';
            enemy.style.left = Math.random() * 90 + "%";
            enemy.style.top = "0px";
            area.appendChild(enemy);
            let ty = 0;
            let fall = setInterval(() => {
                ty += 5; enemy.style.top = ty + "px";
                if(ty > 200) { clearInterval(fall); enemy.remove(); }
                // كشف التصادم
                let pr = player.getBoundingClientRect();
                let er = enemy.getBoundingClientRect();
                if(!(pr.right < er.left || pr.left > er.right || pr.bottom < er.top || pr.top > er.bottom)) {
                    clearInterval(dodgeInterval); clearInterval(fall);
                    alert("انتهت اللعبة!"); closeGame();
                }
            }, 30);
        }, 1000);
    }

    // --- 3. لعبة النقر السريع ---
    function loadFastClick() {
        let count = 0, time = 5;
        const screen = document.getElementById('game-screen');
        screen.innerHTML = `<h3>اضغط بأسرع ما يمكن!</h3><h1 id="timer">5</h1><button class="play-btn" style="height:100px; font-size:30px;" onclick="this.nextSibling.innerText=++count; playSound(400)">اضغط هنا!</button><h1>0</h1>`;
        let itv = setInterval(() => {
            time--; document.getElementById('timer').innerText = time;
            if(time <= 0) { clearInterval(itv); alert("نتيجتك: " + count); closeGame(); }
        }, 1000);
    }

    // (باقي وظائف X-O وصيد الكرة تبقى كما هي في كودك السابق لضمان العمل)
    function loadXO() {
        let b = ["","","","","","","","",""], active = true;
        const screen = document.getElementById('game-screen');
        const render = () => {
            screen.innerHTML = `<h3>X-O ضد الروبوت</h3><div class="xo-grid">${b.map((v,i)=>`<div class="cell" onclick="move(${i})">${v}</div>`).join('')}</div><p id="st"></p>`;
        };
        window.move = (i) => {
            if(b[i]==="" && active) {
                b[i]="X"; playSound(500);
                if(!checkWin(b)) { setTimeout(robot, 400); }
                render();
            }
        };
        const robot = () => {
            let e = b.map((v,i)=> v===""?i:null).filter(v=>v!==null);
            if(e.length > 0 && active) { b[e[Math.floor(Math.random()*e.length)]]="O"; checkWin(b); render(); }
        };
        const checkWin = (board) => {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of w) {
                if(board[p[0]] && board[p[0]]===board[p[1]] && board[p[0]]===board[p[2]]) {
                    active = false; setTimeout(()=>alert(board[p[0]]==="X"?"فزت!":"خسرت!"), 100); return true;
                }
            }
            if(!board.includes("")) { active=false; alert("تعادل!"); return true; }
            return false;
        };
        render();
    }

    function startBallGame() {
        let pts = 0;
        const screen = document.getElementById('game-screen');
        screen.innerHTML = `<div id="arena"><div id="target" style="display:block; width:40px; height:40px; background:yellow; border-radius:50%; position:absolute; cursor:pointer;"></div></div><h2>النقاط: <span id="pts">0</span></h2>`;
        const t = document.getElementById('target');
        const move = () => { t.style.top = Math.random()*160+"px"; t.style.left = Math.random()*360+"px"; };
        t.onclick = () => { pts++; document.getElementById('pts').innerText = pts; playSound(600); move(); };
        move();
    }

    function closeGame() {
        clearInterval(dodgeInterval);
        document.getElementById('gameModal').style.display = "none";
    }
</script>

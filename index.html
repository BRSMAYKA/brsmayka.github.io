<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING - Pro Edition</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff3366; --bg: #0a0a0a; --accent-green: #00ff44; --error-red: #ff3333; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; font-weight: 900; }

        #splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #persistent-score { position: fixed; top: 15px; left: 15px; background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green); padding: 10px; border-radius: 8px; z-index: 10001; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #333; width: 145px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; transition: 0.3s; }
        .wrong-bg { background: #660000 !important; border-color: #ff0000 !important; }
        
        .brs-modal { display: none; position: fixed; z-index: 50000; inset: 0; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
        .brs-modal-content { background: #111; border: 2px solid var(--primary); padding: 30px; border-radius: 20px; max-width: 350px; }

        #timer-bar { height: 8px; background: var(--accent-green); width: 100%; transition: 0.1s linear; border-radius: 10px; }
        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        
        .cell { background: #161616; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 75px; width: 75px; font-size: 38px; border: 1px solid #333; cursor: pointer; font-weight: 900; }
        /* ألوان اللاعبين */
        .p-x { color: var(--accent-green); text-shadow: 0 0 10px var(--accent-green); }
        .p-o { color: var(--error-red); text-shadow: 0 0 10px var(--error-red); }

        .lvl-btn { padding: 6px 12px; font-size: 11px; cursor: pointer; border-radius: 5px; border: 1px solid var(--primary); background: transparent; color: white; margin: 2px; }
        .lvl-btn.active { background: var(--accent-green); color: black; }

        footer { margin-top: 60px; padding-bottom: 40px; border-top: 1px solid #222; }
        .share-container { margin: 25px auto; padding: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 15px; max-width: 400px; border: 1px solid #222; }
        .share-btn { display: inline-block; margin: 5px; padding: 8px 12px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 12px; }
        .wa { background: #25D366; } .fb { background: #1877F2; } .tw { background: #000; border: 1px solid #444; }
    </style>
</head>
<body onload="loadGlobalScore()">

    <div id="splash-screen">
        <h1 class="brand-name">BRSMAYKA OS</h1>
        <button class="btn" style="width:200px" onclick="bootSystem()">ENTER SYSTEM</button>
    </div>

    <div id="persistent-score">Points: <span id="total-points">0</span></div>
    <h1 class="brand-name">BRSMAYKA GAMING</h1>

    <div style="margin: 20px 0;">
        <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
        <script type="text/javascript" src="https://counter1.optistats.ovh/private/counter.js?c=j1hadcun8xqdfhbzttteef2bq7wl376p&down=async" async></script>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="start('math')">➗ <h3>Math</h3></div>
        <div class="game-card" onclick="start('mem')">🧠 <h3>Memory</h3></div>
        <div class="game-card" onclick="start('ball')">👻 <h3>Ghost</h3></div>
        <div class="game-card" onclick="start('tap')">⚡ <h3>Tap</h3></div>
    </div>

    <div id="privacyModal" class="brs-modal">
        <div class="brs-modal-content">
            <h2>Privacy Policy</h2>
            <p>Your game points are saved in your browser.</p>
            <button class="btn" onclick="closePrivacy()" style="width: 100px;">CLOSE</button>
        </div>
    </div>

    <footer>
        <div class="share-container">
            <div style="font-size: 11px; color: #666; margin-bottom: 8px;">SHARE SYSTEM</div>
            <a href="https://api.whatsapp.com/send?text=Play Games! https://brsmayka.github.io" target="_blank" class="share-btn wa">WhatsApp</a>
            <a href="https://www.facebook.com/sharer/sharer.php?u=https://brsmayka.github.io" target="_blank" class="share-btn fb">Facebook</a>
            <a href="https://twitter.com/intent/tweet?url=https://brsmayka.github.io" target="_blank" class="share-btn tw">X</a>
        </div>
        <div style="margin-bottom: 15px;">
            <a onclick="openPrivacy()" style="color: #00ffcc; cursor: pointer; font-weight: bold; border: 1px solid #00ffcc; padding: 5px 15px; border-radius: 20px;">Privacy Policy</a>
        </div>
        <div style="color: #888;">Location: <span style="color: #fff;">Morocco 🇲🇦</span></div>
    </footer>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div id="timer-bar-container" style="width:100%; height:8px; background:#222; border-radius:10px; margin-bottom:15px;">
                <div id="timer-bar"></div>
            </div>
            <div id="game-view"></div>
            <div id="custom-result-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; border-radius:23px;">
                <h1 id="res-title"></h1>
                <p id="res-desc"></p>
                <button class="btn" onclick="hideResult()">PLAY AGAIN</button>
                <button class="btn" style="background:#333; color:white;" onclick="stop()">QUIT</button>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, currentMode, score = 0, gameTimer, timeLeft, globalPoints = 0;
        let board = [], canPlay = true, difficulty = 'hard';

        function playSfx(f, type, vol, dur) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function bootSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            [300, 400, 500, 600].forEach((f, i) => setTimeout(() => playSfx(f, 'sine', 0.1, 0.4), i * 100));
            document.getElementById('splash-screen').style.display = 'none';
        }

        function loadGlobalScore() {
            globalPoints = parseInt(localStorage.getItem('brs_pts')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
        }

        function openPrivacy() { document.getElementById('privacyModal').style.display = 'flex'; }
        function closePrivacy() { document.getElementById('privacyModal').style.display = 'none'; }

        function showResult(title, desc, isWin) {
            clearInterval(gameTimer);
            const overlay = document.getElementById('custom-result-overlay');
            const box = document.getElementById('game-box');
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-desc').innerText = desc;
            
            if(isWin) { 
                playSfx(600, 'sine', 0.1, 0.5); 
                if(title !== 'DRAW') globalPoints += 50; 
            } else { 
                playSfx(150, 'sawtooth', 0.1, 0.5); 
                box.classList.add('wrong-bg'); 
            }
            
            localStorage.setItem('brs_pts', globalPoints);
            document.getElementById('total-points').innerText = globalPoints;
            overlay.style.display = 'flex';
        }

        function hideResult() { 
            document.getElementById('game-box').classList.remove('wrong-bg');
            document.getElementById('custom-result-overlay').style.display = 'none'; 
            start(currentMode); 
        }

        function stop() { clearInterval(gameTimer); document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            currentMode = mode; score = 0; canPlay = true; board = Array(9).fill('');
            document.getElementById('game-box').classList.remove('wrong-bg');
            document.getElementById('gameModal').style.display = 'block';
            document.getElementById('custom-result-overlay').style.display = 'none';
            const view = document.getElementById('game-view'); view.innerHTML = '';
            
            timeLeft = 15; 
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = (timeLeft/15)*100 + '%';
                if(timeLeft <= 0) showResult('TIME OVER', 'Too Slow!', false);
            }, 100);

            if(mode === 'xo') {
                view.innerHTML = `<div style="margin-bottom:10px;">
                    <button class="lvl-btn ${difficulty==='easy'?'active':''}" onclick="difficulty='easy';start('xo')">Easy</button>
                    <button class="lvl-btn ${difficulty==='med'?'active':''}" onclick="difficulty='med';start('xo')">Med</button>
                    <button class="lvl-btn ${difficulty==='hard'?'active':''}" onclick="difficulty='hard';start('xo')">Hard</button>
                </div><div style="display:grid; grid-template-columns:repeat(3,75px); gap:8px; justify-content:center;"></div>`;
                for(let i=0; i<9; i++) {
                    const c = document.createElement('div'); c.className = 'cell'; c.id = 'c'+i;
                    c.onclick = () => { 
                        if(canPlay && board[i]==='') { 
                            playSfx(800,'sine',0.05,0.1); 
                            board[i]='X'; c.innerText='X'; c.classList.add('p-x'); 
                            canPlay=false; 
                            if(!checkWin(board,'X')) { 
                                if(board.includes('')) setTimeout(aiMove, 500); 
                                else showResult('DRAW','Fair Game!',true); 
                            } else showResult('WIN','Great!',true); 
                        } 
                    };
                    view.lastChild.appendChild(c);
                }
            } else if(mode === 'math') {
                const a = Math.floor(Math.random()*30), b = Math.floor(Math.random()*30), ans = a+b;
                view.innerHTML = `<h2>${a} + ${b} = ?</h2>`;
                [ans, ans+5, ans-2].sort(()=>Math.random()-0.5).forEach(o => {
                    const btn = document.createElement('button'); btn.className = 'btn'; btn.innerText = o;
                    btn.onclick = () => { playSfx(800,'sine',0.05,0.1); o === ans ? showResult('CORRECT', '+50 Pts', true) : showResult('WRONG', 'Incorrect', false); };
                    view.appendChild(btn);
                });
            } else if(mode === 'tap') {
                view.innerHTML = `<h3>Tap 30 Times!</h3><button class="btn" style="height:100px; font-size:30px;" onclick="score++; playSfx(1000,'sine',0.02,0.05); this.innerText=score; if(score>=30) showResult('WIN','Fast!',true)">0</button>`;
            } else if(mode === 'ball') {
                view.innerHTML = `<div style="height:200px; position:relative; background:#111; overflow:hidden; border-radius:15px;"><div id="ghost" style="position:absolute; font-size:40px; cursor:pointer;" onclick="score++; playSfx(1200,'sine',0.05,0.1); this.style.left=Math.random()*80+'%'; this.style.top=Math.random()*80+'%'; if(score>=10) showResult('WIN','Hunter!',true)">👻</div></div>`;
            } else if(mode === 'mem') {
                const icons = ['🔥','🔥','💎','💎','⚡','⚡','⭐','⭐'].sort(()=>Math.random()-0.5);
                view.innerHTML = `<div style="display:grid; grid-template-columns:repeat(4,70px); gap:8px; justify-content:center;"></div>`;
                let flipped = [];
                icons.forEach(icon => {
                    const c = document.createElement('div'); c.className = 'cell'; c.innerText = '?';
                    c.onclick = () => { if(flipped.length<2 && c.innerText=='?') { playSfx(900,'sine',0.05,0.1); c.innerText = icon; flipped.push({el:c, val:icon}); if(flipped.length===2) { if(flipped[0].val===flipped[1].val) { score++; flipped=[]; if(score===4) showResult('WIN','Perfect!',true); } else { setTimeout(()=>{ flipped.forEach(f=>f.el.innerText='?'); flipped=[]; }, 500); } } } };
                    view.lastChild.appendChild(c);
                });
            }
        }

        function aiMove() {
            let empty = board.map((v,i)=>v==='' ? i : null).filter(v=>v!==null);
            if(empty.length > 0) {
                let m = empty[Math.floor(Math.random()*empty.length)];
                board[m]='O'; 
                let cell = document.getElementById('c'+m);
                cell.innerText='O'; 
                cell.classList.add('p-o'); // تطبيق اللون الأحمر للروبوت
                if(checkWin(board,'O')) showResult('LOST','AI Wins',false); 
                else if(!board.includes('')) showResult('DRAW','Fair Game!',true);
                else canPlay = true;
            }
        }

        function checkWin(b, p) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return w.some(s => s.every(i => b[i] === p));
        }
    </script>
</body>
</html>

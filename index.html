    <style>

        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }

        #persistent-score {

            border-radius: 15px; max-width: 400px; border: 1px solid #222;
        }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #333; width: 145px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        #custom-result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }

        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }

        /* تذييل الصفحة Footer */
        footer { margin-top: 50px; padding: 20px; background: #111; border-top: 1px solid #333; font-size: 14px; }
        .footer-links a { color: var(--accent-green); text-decoration: none; margin: 0 10px; cursor: pointer; }

        /* نافذة المعلومات */
        .info-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 40000; justify-content: center; align-items: center; }
        .info-card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid var(--accent-green); width: 85%; max-width: 350px; text-align: right; }

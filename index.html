<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA - نسخة المؤثرات</title>
    <style>
        :root { 
            --primary: #00ffcc; 
            --secondary: #ff0055;
            --bg: #050505; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --neon-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }

        /* تأثير الخلفية المتحركة */
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        /* عنوان الموقع مع لمعان */
        .header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; text-shadow: 0 0 20px var(--primary); }
        }

        .container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 40px; 
        }

        /* تصميم الكروت بتأثير الزجاج والنيون */
        .game-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 200px;
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--primary);
            box-shadow: var(--neon-shadow);
            background: rgba(255, 255, 255, 0.1);
        }

        /* تأثير الضوء الذي يمر فوق الكارت */
        .game-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .game-card:hover::after { left: 100%; }

        .game-icon { font-size: 50px; margin-bottom: 15px; display: block; }

        /* الأزرار الاحترافية */
        .btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 6px 20px var(--primary); }

        /* نافذة اللعب المتطورة */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(8px);
            z-index: 1000; 
        }
        .modal-content { 
            background: #111; 
            margin: 5vh auto; 
            width: 90%; 
            max-width: 450px; 
            padding: 30px; 
            border-radius: 30px; 
            border: 2px solid var(--primary); 
            position: relative;
            animation: bounceIn 0.5s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* تأثير اهتزاز عند الخطأ */
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        #arena { background: #000; border-radius: 20px; border: 1px solid #333; height: 250px; position: relative; overflow: hidden; }
        .cell { background: #222; border-radius: 12px; transition: 0.3s; }
        .cell:hover { background: #333; transform: scale(0.95); }

    </style>
</head>
<body onclick="initAudio()">

    <div class="header">
        <h1>🎮 BRSMAYKA GAMING STUDIO</h1>
        <p style="color: #aaa;">جرب الألعاب بتأثيرات بصرية وصوتية مذهلة</p>
    </div>

    <div class="container">
        <div class="game-card" onclick="openGame('xo')">
            <span class="game-icon">❌</span>
            <h3>تحدي X-O</h3>
            <button class="btn">العب الآن</button>
        </div>
        <div class="game-card" onclick="openGame('ball')">
            <span class="game-icon">🎾</span>
            <h3>صيد الكرة</h3>
            <button class="btn">العب الآن</button>
        </div>
        <div class="game-card" onclick="openGame('fast')">
            <span class="game-icon">⚡</span>
            <h3>النقر السريع</h3>
            <button class="btn">العب الآن</button>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content" id="modalBox">
            <span style="position:absolute; left:20px; top:15px; cursor:pointer; font-size:30px;" onclick="closeGame()">&times;</span>
            <div id="game-area"></div>
            <button id="resetBtn" class="btn" style="margin-top:20px; background:#ff7300; color:white; display:none;">إعادة المحاولة 🔄</button>
        </div>
    </div>

<script>
    let audioCtx;
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSfx(f) { 
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1); o.stop(audioCtx.currentTime + 0.1);
    }

    function openGame(g) {
        document.getElementById('gameModal').style.display = "block";
        if(g === 'xo') loadXO();
        if(g === 'ball') loadBall();
        if(g === 'fast') loadFast();
    }

    function loadXO() {
        let b = ["","","","","","","","",""], active = true;
        const area = document.getElementById('game-area');
        const render = () => {
            area.innerHTML = `<h3>X-O ضد الروبوت</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:240px; margin:auto;">${b.map((v,i)=>`<div class="cell" style="height:75px; display:flex; align-items:center; justify-content:center; font-size:35px; font-weight:bold; cursor:pointer;" onclick="move(${i})">${v}</div>`).join('')}</div><h2 id="status"></h2>`;
        };
        window.move = (i) => {
            if(b[i]==="" && active) {
                b[i]="X"; playSfx(600);
                if(!check(b)) setTimeout(robot, 400);
                render();
            }
        };
        const robot = () => {
            let e = b.map((v,i)=> v===""?i:null).filter(v=>v!==null);
            if(e.length > 0 && active) { b[e[Math.floor(Math.random()*e.length)]]="O"; playSfx(400); check(b); render(); }
        };
        const check = (board) => {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of w) {
                if(board[p[0]] && board[p[0]]===board[p[1]] && board[p[0]]===board[p[2]]) {
                    active = false;
                    let winner = board[p[0]]==="X" ? "مبروك!" : "خسرت!";
                    if(winner === "خسرت!") document.getElementById('modalBox').classList.add('shake');
                    document.getElementById('status').innerText = winner;
                    document.getElementById('resetBtn').style.display = "inline-block";
                    document.getElementById('resetBtn').onclick = loadXO;
                    return true;
                }
            }
            return false;
        };
        render();
    }

    function loadBall() {
        let pts = 0;
        document.getElementById('game-area').innerHTML = `<h3>صيد الكرة</h3><div id="arena"><div id="target" onclick="hit()" style="width:40px; height:40px; background:yellow; border-radius:50%; position:absolute; cursor:pointer; box-shadow: 0 0 15px yellow;"></div></div><h2>النقاط: <span id="pts">0</span></h2>`;
        window.hit = () => { pts++; document.getElementById('pts').innerText = pts; playSfx(800); move(); };
        const move = () => { 
            const t = document.getElementById('target');
            if(t) { t.style.top = Math.random()*190+"px"; t.style.left = Math.random()*360+"px"; }
        };
        move();
    }

    function loadFast() {
        let count = 0, t = 5;
        document.getElementById('game-area').innerHTML = `<h3>اضغط بسرعة!</h3><h1 id="timer">5</h1><button class="btn" style="width:100%; height:80px; font-size:30px;" onclick="clickMe()">اضغط!</button><h1>النقرات: <span id="c">0</span></h1>`;
        window.clickMe = () => { count++; document.getElementById('c').innerText = count; playSfx(500); };
        let timer = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) { clearInterval(timer); alert("انتهى! نتيجتك: " + count); closeGame(); }
        }, 1000);
    }

    function closeGame() { 
        document.getElementById('gameModal').style.display = "none"; 
        document.getElementById('modalBox').classList.remove('shake');
    }
</script>

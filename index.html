<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --accent-green: #00ff44; --error-red: #ff3333; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; font-weight: 900; }
        #persistent-score { position: fixed; top: 15px; left: 15px; background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green); padding: 8px; border-radius: 8px; font-size: 14px; }
        
        .section-title { color: var(--primary); margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 1rem; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 15px; }
        .game-card { background: #111; border: 1px solid #333; width: 140px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-3px); }

        /* Internal Rating System Styles */
        .rating-box { background: #111; border: 1px solid var(--accent-green); border-radius: 20px; padding: 20px; max-width: 400px; margin: 40px auto; }
        .stars { font-size: 35px; cursor: pointer; color: #444; transition: 0.2s; }
        .stars:hover, .stars.selected { color: gold; text-shadow: 0 0 10px gold; }
        .rating-stats { margin-top: 10px; font-size: 14px; color: #888; }
        
        footer { margin-top: 50px; padding-bottom: 30px; border-top: 1px solid #222; font-size: 13px; }
        .btn { background: var(--accent-green); color: #000; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="persistent-score">Points: <span id="total-points">0</span></div>
    <h1 class="brand-name">BRSMAYKA</h1>

    <h2 class="section-title">MINI GAMES</h2>
    <div class="container">
        <div class="game-card" onclick="alert('Game Loading...')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="alert('Game Loading...')">➗ <h3>Math</h3></div>
        <div class="game-card" onclick="alert('Game Loading...')">🧠 <h3>Memory</h3></div>
        <div class="game-card" onclick="alert('Game Loading...')">👻 <h3>Ghost</h3></div>
        <div class="game-card" onclick="alert('Game Loading...')">⚡ <h3>Tap</h3></div>
    </div>

    <h2 class="section-title">TOP WEB GAMES (NO DOWNLOAD)</h2>
    <div class="container">
        <div class="game-card" onclick="window.open('https://poki.com', '_blank')">🎮 <h3>Poki</h3></div>
        <div class="game-card" onclick="window.open('https://crazygames.com', '_blank')">🕹️ <h3>CrazyGames</h3></div>
        <div class="game-card" onclick="window.open('https://game-distribution.com', '_blank')">🌐 <h3>Web Games</h3></div>
    </div>

    <div class="rating-box">
        <h3 style="margin-top:0; color:var(--accent-green);">⭐ Rate Our Games</h3>
        <div id="star-container">
            <span class="stars" onclick="submitRating(1)">★</span>
            <span class="stars" onclick="submitRating(2)">★</span>
            <span class="stars" onclick="submitRating(3)">★</span>
            <span class="stars" onclick="submitRating(4)">★</span>
            <span class="stars" onclick="submitRating(5)">★</span>
        </div>
        <div class="rating-stats">
            Average: <span id="avg-val">0</span>/5 | Total Votes: <span id="count-val">0</span>
        </div>
        <p id="thank-msg" style="display:none; color:var(--primary); font-size:12px;">Thank you for rating!</p>
    </div>

    <footer>
        <p>Location: Morocco 🇲🇦</p>
        <a href="#" style="color:var(--primary);">Privacy Policy</a>
    </footer>

    <script>
        // Points Logic
        let pts = localStorage.getItem('brs_pts') || 0;
        document.getElementById('total-points').innerText = pts;

        // Internal Rating Logic (Saves in Local Storage)
        let totalVotes = parseInt(localStorage.getItem('brs_votes')) || 0;
        let sumRatings = parseInt(localStorage.getItem('brs_sum')) || 0;

        function updateStats() {
            let avg = totalVotes === 0 ? 0 : (sumRatings / totalVotes).toFixed(1);
            document.getElementById('avg-val').innerText = avg;
            document.getElementById('count-val').innerText = totalVotes;
        }

        function submitRating(val) {
            totalVotes++;
            sumRatings += val;
            
            // Save to browser memory
            localStorage.setItem('brs_votes', totalVotes);
            localStorage.setItem('brs_sum', sumRatings);
            
            // Update UI
            updateStats();
            highlightStars(val);
            document.getElementById('thank-msg').style.display = 'block';
            
            // Disable further voting for this session
            document.getElementById('star-container').style.pointerEvents = 'none';
        }

        function highlightStars(val) {
            let s = document.getElementsByClassName('stars');
            for(let i=0; i<val; i++) {
                s[i].classList.add('selected');
            }
        }

        // Initialize Stats on Load
        updateStats();
    </script>
</body>
</html>

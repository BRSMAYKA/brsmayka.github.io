<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING - Pro Edition</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff3366; --bg: #0a0a0a; --accent-green: #00ff44; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; font-weight: 900; }

        #splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #persistent-score { position: fixed; top: 15px; left: 15px; background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green); padding: 10px; border-radius: 8px; z-index: 10001; }

        /* تنسيق الألعاب */
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #333; width: 145px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }

        /* نافذة الخصوصية (المخفية) */
        .brs-modal { display: none; position: fixed; z-index: 50000; inset: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .brs-modal-content { background: #111; border: 2px solid #00ffcc; padding: 30px; border-radius: 20px; max-width: 350px; text-align: center; }
        .brs-modal-content h2 { color: #00ffcc; margin-top: 0; }

        /* أزرار المشاركة في الأسفل */
        .share-container { margin: 25px auto; padding: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 15px; max-width: 400px; border: 1px solid #222; }
        .share-btn { display: inline-block; margin: 5px; padding: 10px 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .wa { background: #25D366; } .fb { background: #1877F2; } .tw { background: #000; border: 1px solid #333; }
        .share-btn:hover { transform: scale(1.05); }

        /* نافذة اللعب والعداد */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; }
        .modal-content { background: #0f0f0f; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        #timer-bar { height: 8px; background: var(--accent-green); width: 100%; transition: 0.1s linear; border-radius: 10px; }
        
        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        .cell { background: #161616; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 75px; width: 75px; font-size: 32px; border: 1px solid #333; color: var(--accent-green); }
        
        @keyframes shake { 0% { transform: translate(2px, 2px); } 100% { transform: translate(0, 0); } }
        .shake-fx { animation: shake 0.4s both; }
    </style>
</head>
<body onload="loadGlobalScore()">

    <div id="splash-screen">
        <h1 class="brand-name">BRSMAYKA OS</h1>
        <button class="btn" style="width:200px" onclick="bootSystem()">ENTER SYSTEM</button>
    </div>

    <div id="persistent-score">Points: <span id="total-points">0</span></div>
    <h1 class="brand-name">BRSMAYKA GAMING</h1>

    <div style="margin: 20px 0;">
        <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
        <script type="text/javascript" src="https://counter1.optistats.ovh/private/counter.js?c=j1hadcun8xqdfhbzttteef2bq7wl376p&down=async" async></script>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="start('math')">➗ <h3>Math</h3></div>
        <div class="game-card" onclick="start('mem')">🧠 <h3>Memory</h3></div>
        <div class="game-card" onclick="start('ball')">👻 <h3>Ghost</h3></div>
        <div class="game-card" onclick="start('tap')">⚡ <h3>Tap</h3></div>
    </div>

    <div id="privacyModal" class="brs-modal">
        <div class="brs-modal-content">
            <h2>Privacy Policy</h2>
            <p>Your privacy is respected. Points and game data are stored locally on your device only.</p>
            <button class="btn" onclick="closePrivacy()" style="width: 100px;">CLOSE</button>
        </div>
    </div>

    <footer style="margin-top: 60px; padding-bottom: 40px; border-top: 1px solid #1a1a1a;">
        
        <div class="share-container">
            <div style="font-size: 11px; color: #666; margin-bottom: 8px;">SHARE WITH FRIENDS</div>
            <a href="https://api.whatsapp.com/send?text=Play BRSMAYKA GAMES!" target="_blank" class="share-btn wa">WhatsApp</a>
            <a href="https://www.facebook.com/sharer/sharer.php?u=https://brsmayka.github.io" target="_blank" class="share-btn fb">Facebook</a>
            <a href="https://twitter.com/intent/tweet?text=Gaming!" target="_blank" class="share-btn tw">X</a>
        </div>

        <div style="margin-bottom: 15px;">
            <a onclick="openPrivacy()" style="color: #00ffcc; text-decoration: none; cursor: pointer; font-weight: bold; font-size: 13px; border: 1px solid #00ffcc; padding: 5px 15px; border-radius: 20px;">
               Privacy Policy
            </a>
        </div>
        <div style="color: #888; font-size: 14px;">
            Location: <span style="color: #ffffff; font-weight: bold;">Morocco 🇲🇦</span>
        </div>
    </footer>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div id="timer-bar"></div>
            <div id="game-view" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        let currentMode, globalPoints = 0, gameTimer;

        function bootSystem() { document.getElementById('splash-screen').style.display = 'none'; }
        
        function loadGlobalScore() {
            globalPoints = parseInt(localStorage.getItem('brs_gaming_score')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
        }

        // تحكم نافذة الخصوصية
        function openPrivacy() { document.getElementById('privacyModal').style.display = 'flex'; }
        function closePrivacy() { document.getElementById('privacyModal').style.display = 'none'; }

        function stop() { clearInterval(gameTimer); document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            currentMode = mode;
            document.getElementById('gameModal').style.display = 'block';
            const view = document.getElementById('game-view');
            view.innerHTML = '<h2 style="color:white">Game Loading...</h2>';
            // منطق الألعاب الخاص بك يتبع هنا...
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA AI - 2026 Edition 🚀</title>
    <style>
        :root { --primary: #0088ff; --secondary: #ff3333; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow: hidden; }
        
        #persistent-score {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0, 136, 255, 0.2);
            border: 2px solid var(--primary);
            padding: 10px 15px; border-radius: 12px;
            font-weight: bold; z-index: 10001;
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        #fx-layer {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20000; pointer-events: none;
            flex-direction: column; align-items: center;
        }
        .fx-emoji { font-size: 6rem; filter: drop-shadow(0 0 20px var(--primary)); animation: bounce 0.6s infinite alternate; }
        .fx-points { font-size: 3rem; font-weight: 900; color: #00ff88; text-shadow: 0 0 20px #00ff88; margin-top: 10px; }

        .balloon { position: fixed; bottom: -100px; width: 40px; height: 50px; border-radius: 50%; z-index: 15000; animation: rise 4s ease-in forwards; }

        @keyframes rise { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120vh); opacity: 0; } }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .header-box { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 25px; }
        .header-box h1 { font-size: 2.5rem; color: var(--primary); text-shadow: 0 0 20px var(--primary); margin: 0; }
        .counter-wrapper { background: rgba(255, 255, 255, 0.05); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--primary); display: inline-block; margin-top: 10px; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 130px; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: scale(1.05); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 5vh auto; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        .win-text { color: #00ff88; font-size: 2.2rem; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 80%; margin-top: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-hint { background: #555; font-size: 0.8rem; width: 50%; }

        .riddle-text { font-size: 1.2rem; line-height: 1.5; margin: 20px 0; color: #ddd; }
        #hint-text { color: #ffcc00; font-style: italic; margin-bottom: 10px; min-height: 20px; display: block; }
        .riddle-input { width: 90%; padding: 12px; border-radius: 10px; border: 1px solid var(--primary); background: #222; color: white; text-align: center; font-size: 1rem; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body onload="loadGlobalScore()">
    <div id="persistent-score">Score: <span id="total-points">0</span></div>

    <div id="fx-layer">
        <div class="fx-emoji" id="fx-emoji">🌟</div>
        <div class="fx-points" id="fx-text">+0 Points</div>
    </div>

    <div class="header-box">
        <h1>🎮 BRSMAYKA AI</h1>
        <div class="counter-wrapper">
            <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
        </div>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('riddle')"> 🧩 <h3>Riddles</h3> </div>
        <div class="game-card" onclick="start('xo')"> ❌ <h3>Tic-Tac-Toe</h3> </div>
        <div class="game-card" onclick="start('stop5')"> ⏱️ <h3>5s Challenge</h3> </div>
        <div class="game-card" onclick="start('ball')"> 👻 <h3>Ghost Hunt</h3> </div>
        <div class="game-card" onclick="start('mem')"> 🧠 <h3>Memory</h3> </div>
        <div class="game-card" onclick="start('tap')"> ⚡ <h3>Speed Tap</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:35px; cursor:pointer; color:white;" onclick="stop()">&times;</span>
            <div id="game-view"></div>
            <div id="result-overlay">
                <h1 id="result-msg"></h1>
                <p id="result-details" style="color:#aaa;"></p>
                <button class="btn" onclick="hideResult()">Next 🔄</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://counter1.optistats.ovh/private/counter.js?c=j1hadcun8xqdfhbzttteef2bq7wl376p&down=async" async></script>

    <script>
        let currentMode, currentRiddle, globalPoints = 0;
        let hintUsed = false;

        const pointsMap = { 'xo': 15, 'riddle': 30, 'stop5': 20, 'ball': 10, 'mem': 15, 'tap': 5 };
        const emojiMap = { 'xo': '❌', 'riddle': '🧩', 'stop5': '⏱️', 'ball': '👻', 'mem': '🧠', 'tap': '⚡' };

        const riddles = [
            { q: "What has keys but can't open locks?", a: "piano", h: "It's a musical instrument." },
            { q: "What has to be broken before you can use it?", a: "egg", h: "You cook it for breakfast." },
            { q: "What gets wetter the more it dries?", a: "towel", h: "You use it after a shower." },
            { q: "What has one eye but can't see?", a: "needle", h: "Used for sewing clothes." },
            { q: "The more of this there is, the less you see. What is it?", a: "darkness", h: "The opposite of light." }
        ];

        function loadGlobalScore() {
            globalPoints = parseInt(localStorage.getItem('brsmayka_score')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
        }

        function triggerWinFX(game, finalPoints) {
            const fxLayer = document.getElementById('fx-layer');
            document.getElementById('fx-emoji').innerText = emojiMap[game];
            document.getElementById('fx-text').innerText = `+${finalPoints} Points`;
            fxLayer.style.display = 'flex';
            createBalloons();
            setTimeout(() => { fxLayer.style.display = 'none'; }, 4000);
        }

        function createBalloons() {
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'balloon';
                    b.style.left = Math.random() * 100 + 'vw';
                    b.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
                    document.body.appendChild(b);
                    setTimeout(() => b.remove(), 4000);
                }, i * 150);
            }
        }

        function showResult(msg, details, isWin) {
            const overlay = document.getElementById('result-overlay');
            document.getElementById('result-msg').innerText = msg;
            document.getElementById('result-msg').className = isWin ? 'win-text' : 'lose-text';
            document.getElementById('result-details').innerText = details;
            
            if(isWin) {
                let p = pointsMap[currentMode];
                if(currentMode === 'riddle' && hintUsed) p -= 10; // Penalty for hint
                globalPoints += p;
                localStorage.setItem('brsmayka_score', globalPoints);
                document.getElementById('total-points').innerText = globalPoints;
                triggerWinFX(currentMode, p);
            }
            overlay.style.display = 'flex';
        }

        function hideResult() { document.getElementById('result-overlay').style.display = 'none'; start(currentMode); }
        function stop() { document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            currentMode = mode; hintUsed = false;
            document.getElementById('gameModal').style.display = 'block';
            const view = document.getElementById('game-view');
            view.innerHTML = '';

            if(mode === 'riddle') {
                currentRiddle = riddles[Math.floor(Math.random() * riddles.length)];
                view.innerHTML = `
                    <h3>Riddle Challenge 🧩</h3>
                    <p class="riddle-text">${currentRiddle.q}</p>
                    <span id="hint-text"></span>
                    <input type="text" id="riddle-ans" class="riddle-input" placeholder="Type answer...">
                    <button class="btn" onclick="checkRiddle()">Submit Answer</button>
                    <button class="btn btn-hint" onclick="showHint()">Get Hint (-10 pts)</button>
                `;
            } else {
                view.innerHTML = `<h3>Coming Soon</h3><p>Game logic for ${mode} is active.</p>`;
                // (Other games logic remains as in previous version)
            }
        }

        function showHint() {
            if(!hintUsed) {
                hintUsed = true;
                document.getElementById('hint-text').innerText = "Hint: " + currentRiddle.h;
            }
        }

        function checkRiddle() {
            const user = document.getElementById('riddle-ans').value.toLowerCase().trim();
            if(user === currentRiddle.a) showResult('Correct!', 'You are a genius!', true);
            else showResult('Wrong!', 'The answer was ' + currentRiddle.a, false);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMES - WAR MODE 🚀</title>
    <style>
        :root { --primary: #0088ff; --accent: #ff0000; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        /* عداد FPS احترافي */
        #stats-bar { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 5px 12px; border-radius: 8px; font-family: monospace; z-index: 10000; text-align: left; font-size: 12px; pointer-events: none; }
        .stat-line { color: #00ff00; margin: 2px 0; }

        .header-box { margin-bottom: 30px; }
        .rocket-row { display: flex; align-items: center; justify-content: center; gap: 15px; }
        h1 { font-size: 2rem; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 140px; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: scale(1.05); background: rgba(0, 136, 255, 0.1); }

        /* نافذة اللعبة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; backdrop-filter: blur(8px); }
        .modal-content { background: #111; margin: 5vh auto; width: 95%; max-width: 500px; padding: 20px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        #war-zone { position: relative; background: url('https://www.transparenttextures.com/patterns/dark-matter.png'), #1a1a1a; height: 300px; width: 100%; border: 2px solid #444; overflow: hidden; border-radius: 15px; cursor: crosshair; }
        
        /* العدو (الجندي) */
        .enemy { position: absolute; width: 50px; height: 60px; background: url('https://cdn-icons-png.flaticon.com/512/711/711768.png'); background-size: contain; background-repeat: no-repeat; filter: drop-shadow(0 0 5px red); transition: transform 0.1s; pointer-events: auto; }
        .enemy:active { transform: scale(0.8); }

        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 80%; margin-top: 15px; }
    </style>
</head>
<body onclick="initAudio()">

    <div id="stats-bar">
        <div class="stat-line" id="fps-val">FPS: --</div>
        <div class="stat-line" style="color: #00ccff;">REFRESH: 120Hz</div>
    </div>

    <div class="header-box">
        <div class="rocket-row">
            <span>🚀</span>
            <h1>BRSMAYKA GAMES</h1>
            <span>🚀</span>
        </div>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('war')"> 🔫 <h3>War Mode</h3> </div>
        <div class="game-card" onclick="start('math')"> ➕ <h3>Math</h3> </div>
        <div class="game-card" onclick="start('ball')"> 👻 <h3>Ghost</h3> </div>
        <div class="game-card" onclick="start('tap')"> ⚡ <h3>Speed</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; left:20px; top:10px; font-size:30px; cursor:pointer; color:white; z-index:101;" onclick="stop()">&times;</span>
            <div id="result-overlay">
                <h1 id="res-title">Mission End</h1>
                <p id="res-body"></p>
                <button class="btn" onclick="hideResult()">Re-deploy 🔄</button>
            </div>
            <div id="game-view"></div>
        </div>
    </div>

    <script>
        // --- نظام الـ FPS المتطور ---
        let lastTimestamp = performance.now();
        let frames = 0;
        function updateStats() {
            let now = performance.now();
            frames++;
            if (now >= lastTimestamp + 1000) {
                document.getElementById('fps-val').innerText = "FPS: " + frames;
                frames = 0;
                lastTimestamp = now;
            }
            requestAnimationFrame(updateStats);
        }
        updateStats();

        let ctx, timerInt, currentGame = '';
        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        function sfx(f, d = 0.1) { if(ctx) { const o=ctx.createOscillator(), g=ctx.createGain(); o.frequency.value=f; o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + d); o.stop(ctx.currentTime + d); } }

        function start(m) {
            currentGame = m; clearInterval(timerInt);
            document.getElementById('gameModal').style.display="block";
            const v = document.getElementById('game-view');
            v.innerHTML = '';
            if(m === 'war') loadWarGame(v);
            else v.innerHTML = `<h3>Coming Soon</h3>`;
        }

        function stop() { clearInterval(timerInt); document.getElementById('gameModal').style.display="none"; }
        function hideResult() { document.getElementById('result-overlay').style.display = 'none'; start(currentGame); }

        // --- لعبة الحرب: Warzone ---
        function loadWarGame(v) {
            let kills = 0, ammo = 10, timeLeft = 15;
            v.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>Time: <b id="w-time">15</b>s</span>
                    <span>Ammo: <b id="w-ammo">10</b></span>
                    <span>Kills: <b id="w-kills">0</b></span>
                </div>
                <div id="war-zone"></div>
                <p style="font-size:12px; color:#666;">انقر على الأعداء للقضاء عليهم قبل اختفائهم!</p>
            `;
            
            const zone = document.getElementById('war-zone');
            
            function spawnEnemy() {
                if(currentGame !== 'war' || timeLeft <= 0) return;
                const enemy = document.createElement('div');
                enemy.className = 'enemy';
                enemy.style.left = Math.random() * (zone.clientWidth - 60) + "px";
                enemy.style.top = Math.random() * (zone.clientHeight - 70) + "px";
                
                enemy.onclick = (e) => {
                    e.stopPropagation();
                    kills++;
                    document.getElementById('w-kills').innerText = kills;
                    sfx(150, 0.1); // صوت إطلاق نار بسيط
                    enemy.remove();
                    spawnEnemy();
                };
                
                zone.appendChild(enemy);
                // العدو يختفي بسرعة ليحفز الـ 120 إطار
                setTimeout(() => { if(enemy.parentNode) { enemy.remove(); spawnEnemy(); } }, 1200);
            }

            // صوت إطلاق نار عند النقر في أي مكان بالمنطقة
            zone.onclick = () => {
                if(ammo > 0) { ammo--; document.getElementById('w-ammo').innerText = ammo; sfx(400, 0.05); }
                if(ammo <= 0) { /* Reload logic could go here */ }
            };

            spawnEnemy();
            spawnEnemy(); // عدو ثانٍ لزيادة الحماس

            timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('w-time').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInt);
                    document.getElementById('result-overlay').style.display = 'flex';
                    document.getElementById('res-title').innerText = "Mission Over";
                    document.getElementById('res-body').innerText = `You eliminated ${kills} targets!`;
                }
            }, 1000);
        }
    </script>
</body>
</html>

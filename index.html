<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5416315671829266" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING - Full Professional Edition</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff3366; --bg: #0a0a0a; --accent-green: #00ff44; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        .brand-name { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); font-size: 2.5rem; margin: 10px 0; font-weight: 900; }
        
        #splash-screen { position: fixed; inset: 0; background: var(--bg); z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #persistent-score { position: fixed; top: 15px; left: 15px; background: rgba(0, 255, 68, 0.1); border: 1px solid var(--accent-green); padding: 10px; border-radius: 8px; z-index: 10001; }
        
        .share-container { margin: 20px auto; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 15px; max-width: 400px; }
        .share-btn { display: inline-block; margin: 5px; padding: 10px 15px; border-radius: 8px; text-decoration: none; color: white; font-weight: bold; font-size: 13px; }
        .wa { background: #25D366; } .fb { background: #1877F2; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .game-card { background: #111; border: 1px solid #333; width: 145px; border-radius: 15px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #0f0f0f; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        .btn { background: var(--accent-green); color: #000; border: none; padding: 12px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 85%; margin: 5px; }
        .cell { background: #161616; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 70px; width: 70px; font-size: 28px; border: 1px solid #333; cursor: pointer; color: var(--accent-green); }

        footer { margin-top: 50px; padding: 20px; border-top: 1px solid #333; }
        .footer-links a { color: var(--accent-green); text-decoration: none; margin: 0 10px; cursor: pointer; }
        .info-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 40000; justify-content: center; align-items: center; }
        .info-card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid var(--accent-green); width: 85%; max-width: 350px; text-align: right; }
    </style>
</head>
<body onload="loadGlobalScore()">

    <div id="splash-screen">
        <h1 class="brand-name">BRSMAYKA OS</h1>
        <button class="btn" onclick="bootSystem()">ENTER SYSTEM</button>
    </div>

    <div id="persistent-score">Points: <span id="total-points">0</span></div>
    <h1 class="brand-name">BRSMAYKA GAMING</h1>

    <div class="share-container">
        <a href="https://api.whatsapp.com/send?text=Play on BrsMayka: https://brsmayka.github.io" class="share-btn wa">WhatsApp</a>
        <a href="https://www.facebook.com/sharer/sharer.php?u=https://brsmayka.github.io" class="share-btn fb">Facebook</a>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('xo')">🤖 <h3>XO AI</h3></div>
        <div class="game-card" onclick="start('math')">➗ <h3>Math</h3></div>
        <div class="game-card" onclick="start('mem')">🧠 <h3>Memory</h3></div>
        <div class="game-card" onclick="start('ball')">👻 <h3>Ghost</h3></div>
        <div class="game-card" onclick="start('tap')">⚡ <h3>Tap</h3></div>
    </div>

    <div id="gameModal" class="modal">
        <div id="game-box" class="modal-content">
            <span style="float:right; font-size:30px; cursor:pointer; color:white;" onclick="stop()">&times;</span>
            <div id="game-view" style="margin-top:30px;"></div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a onclick="showOwnerInfo()">Owner Info</a>
            <a onclick="alert('Privacy Policy: We respect your privacy.')">Privacy Policy</a>
        </div>
    </footer>

    <div id="owner-modal" class="info-overlay">
        <div class="info-card">
            <h2>المطور</h2>
            <p><strong>الاسم:</strong> BrsMayka</p>
            <p><strong>الموقع:</strong> Morocco</p>
            <button class="btn" onclick="hideOwnerInfo()">إغلاق</button>
        </div>
    </div>

    <script>
        let audioCtx, globalPoints = 0, currentScore = 0;

        function bootSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('splash-screen').style.display = 'none';
        }

        function loadGlobalScore() {
            globalPoints = parseInt(localStorage.getItem('brs_score')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
        }

        function updateScore(p) {
            globalPoints += p;
            localStorage.setItem('brs_score', globalPoints);
            document.getElementById('total-points').innerText = globalPoints;
        }

        function showOwnerInfo() { document.getElementById('owner-modal').style.display = 'flex'; }
        function hideOwnerInfo() { document.getElementById('owner-modal').style.display = 'none'; }
        function stop() { document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            document.getElementById('gameModal').style.display = 'block';
            const view = document.getElementById('game-view');
            view.innerHTML = '';
            
            if(mode === 'math') {
                let a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20);
                view.innerHTML = `<h2>${a} + ${b} = ?</h2>`;
                [a+b, a+b+2, a+b-1].sort(()=>Math.random()-0.5).forEach(ans => {
                    let b = document.createElement('button'); b.className = 'btn'; b.innerText = ans;
                    b.onclick = () => { if(ans === a+b) { alert('Correct!'); updateScore(10); start('math'); } else { alert('Wrong!'); stop(); }};
                    view.appendChild(b);
                });
            } else if(mode === 'tap') {
                currentScore = 0;
                view.innerHTML = `<h2>Tap 20 times!</h2><button class="btn" id="t-btn" style="height:100px; font-size:30px;" onclick="tapFunc()">0</button>`;
            } else if(mode === 'ball') {
                view.innerHTML = `<div style="height:200px; position:relative; background:#111; border-radius:10px;">
                <div id="gh" style="position:absolute; font-size:40px; cursor:pointer;" onclick="this.style.left=Math.random()*80+'%'; this.style.top=Math.random()*80+'%'; updateScore(5);">👻</div></div>`;
            } else if(mode === 'xo') {
                view.innerHTML = `<div style="display:grid; grid-template-columns:repeat(3,70px); gap:5px; justify-content:center;" id="xo-b"></div>`;
                for(let i=0; i<9; i++) {
                    let c = document.createElement('div'); c.className = 'cell'; c.onclick = () => { if(c.innerText===''){c.innerText='X'; updateScore(2);}};
                    document.getElementById('xo-b').appendChild(c);
                }
            } else if(mode === 'mem') {
                view.innerHTML = `<h2>Memory Game</h2><p>Coming very soon!</p><button class="btn" onclick="stop()">Close</button>`;
            }
        }

        function tapFunc() {
            currentScore++;
            document.getElementById('t-btn').innerText = currentScore;
            if(currentScore >= 20) { alert('Finished!'); updateScore(20); stop(); }
        }
    </script>
</body>
</html>

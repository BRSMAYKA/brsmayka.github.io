<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA AI - Rocket Edition</title>
    <style>
        :root { --primary: #0088ff; --secondary: #ff3333; --bg: #050505; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #111, #050505); }
        
        /* القسم العلوي بالصواريخ */
        .header-box { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .header-box h1 { font-size: 2rem; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 150px; border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(0, 136, 255, 0.1); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 10vh auto; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; }
        
        #result-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; }
        .win-text { color: #00ff88; font-size: 2.2rem; text-shadow: 0 0 20px #00ff88; }
        .lose-text { color: #ff3333; font-size: 2.2rem; text-shadow: 0 0 20px #ff3333; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; font-size: 1.1rem; }
        .cell { background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; height: 70px; font-size: 30px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--primary); background: #222; color: white; text-align: center; font-size: 22px; margin-bottom: 10px; }
    </style>
</head>
<body onclick="initAudio()">
    <div class="bg-layer"></div>
    <div class="header-box">
        <span style="font-size: 2.5rem;">🚀</span>
        <h1>BRSMAYKA AI</h1>
        <span style="font-size: 2.5rem;">🚀</span>
    </div>

    <div class="container">
        <div class="game-card" onclick="start('xo')"> ❌ <h3>X-O</h3> </div>
        <div class="game-card" onclick="start('ball')"> 👻 <h3>الشبح</h3> </div>
        <div class="game-card" onclick="start('mem')"> 🧠 <h3>الذاكرة</h3> </div>
        <div class="game-card" onclick="start('tap')"> ⚡ <h3>السرعة</h3> </div>
        <div class="game-card" onclick="start('hack')"> 📟 <h3>اختراق</h3> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; left:20px; top:10px; font-size:30px; cursor:pointer; color:white; z-index:101;" onclick="stop()">&times;</span>
            <div id="result-overlay">
                <h1 id="result-msg"></h1>
                <p id="result-details" style="color:#aaa;"></p>
                <button class="btn" onclick="hideResult()">إعادة المحاولة 🔄</button>
            </div>
            <div id="game-view"></div>
        </div>
    </div>

    <script>
        let ctx, timerInterval, ballLoop, currentGame = '';
        function initAudio() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        function sfx(f, d = 0.1) { if(ctx) { const o=ctx.createOscillator(), g=ctx.createGain(); o.frequency.value=f; o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + d); o.stop(ctx.currentTime + d); } }
        function winSnd() { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => sfx(f, 0.2), i * 150)); }
        function loseSnd() { [392, 349, 311, 261].forEach((f, i) => setTimeout(() => sfx(f, 0.4), i * 200)); }

        function showResult(msg, details, isWin) {
            const overlay = document.getElementById('result-overlay');
            document.getElementById('result-msg').innerText = msg;
            document.getElementById('result-msg').className = isWin ? 'win-text' : 'lose-text';
            document.getElementById('result-details').innerText = details;
            overlay.style.display = 'flex';
            if(isWin) winSnd(); else loseSnd();
        }

        function hideResult() { document.getElementById('result-overlay').style.display = 'none'; start(currentGame); }

        function start(m) {
            currentGame = m; clearInterval(timerInterval); clearTimeout(ballLoop);
            document.getElementById('gameModal').style.display="block";
            const v = document.getElementById('game-view');
            if(m==='xo') loadXO(v);
            if(m==='ball') loadBall(v);
            if(m==='mem') loadMem(v);
            if(m==='tap') loadTap(v);
            if(m==='hack') loadHack(v);
        }

        function stop() { clearInterval(timerInterval); clearTimeout(ballLoop); document.getElementById('gameModal').style.display="none"; }

        // --- 1. اللعبة الجديدة: اختراق الرمز ---
        function loadHack(v) {
            let code = Math.floor(100 + Math.random() * 900); // رقم من 3 خانات
            let t = 15;
            v.innerHTML = `<h3>اختراق النظام</h3><p>خمن الرقم السري (من 100 لـ 999)</p><h1 id="htm" style="color:yellow">15</h1>
            <input type="number" id="hackInp" placeholder="؟؟؟">
            <button class="btn" id="hackBtn">محاولة اختراق 🔐</button>
            <p id="hint" style="margin-top:10px; color:#00ff88;">ابدأ التخمين!</p>`;
            
            const inp = document.getElementById('hackInp');
            const btn = document.getElementById('hackBtn');
            const hint = document.getElementById('hint');
            setTimeout(() => inp.focus(), 100);

            timerInterval = setInterval(() => {
                t--; document.getElementById('htm').innerText = t;
                if(t <= 0) { clearInterval(timerInterval); showResult("فشل الاختراق! 🤖", `الرمز كان: ${code}`, false); }
            }, 1000);

            btn.onclick = () => {
                let val = parseInt(inp.value);
                if(val === code) { clearInterval(timerInterval); showResult("تم الاختراق! 🚀", "أنت هكر محترف", true); }
                else if (val > code) { hint.innerText = "الرقم السري أصغر! 👇"; sfx(200); }
                else { hint.innerText = "الرقم السري أكبر! 👆"; sfx(200); }
                inp.value = ""; inp.focus();
            };
        }

        // --- 2. X-O ---
        function loadXO(v) {
            let b=["","","","","","","","",""], a=true;
            const draw=()=> { v.innerHTML=`<h3>X-O</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">${b.map((s,i)=>`<div class="cell" onclick="clickXO(${i})">${s}</div>`).join('')}</div>`; };
            window.clickXO=(i)=> { if(b[i]==="" && a) { b[i]="X"; sfx(600); if(!chk(b)) setTimeout(rob,400); draw(); } };
            const rob=()=> { let e=b.map((s,i)=>s===""?i:null).filter(v=>v!==null); if(e.length>0 && a){ b[e[Math.floor(Math.random()*e.length)]]="O"; sfx(400); chk(b); draw(); } };
            const chk=(x)=> { const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let p of w){ if(x[p[0]] && x[p[0]]===x[p[1]] && x[p[0]]===x[p[2]]){ a=false; showResult(x[p[0]]==="X"?"فزت! 🔥":"خسرت! 🤖", "", x[p[0]]==="X"); return true; } } if(!x.includes("")){ showResult("تعادل!", "", true); return true; } return false; };
            draw();
        }

        // --- 3. الشبح ---
        function loadBall(v) {
            let p=0, r=0; v.innerHTML=`<h3>الشبح (20)</h3><div id="arena"><div id="ball"></div></div><h4 id="sc">أنت: 0 | الـ AI: 0</h4>`;
            const b=document.getElementById('ball');
            const mv=()=> { b.style.display="block"; b.style.top=Math.random()*150+"px"; b.style.left=Math.random()*250+"px"; b.style.opacity="1"; let hit=false; b.onclick=()=>{ hit=true; p++; sfx(800); upd(); };
            setTimeout(()=>{ if(!hit){ r++; upd(); } b.style.opacity="0"; if(p<20 && r<20) ballLoop=setTimeout(mv, 1500); else showResult(p>=20?"بطل!":"خسرت!", "", p>=20); }, 800); };
            const upd=()=>{ document.getElementById('sc').innerText=`أنت: ${p} | الـ AI: ${r}`; }; mv();
        }

        // --- 4. الذاكرة ---
        function loadMem(v) {
            const icons=['🍎','🍎','🍌','🍌','🍇','🍇','🍒','🍒'];
            let s=icons.sort(()=>Math.random()-0.5), sel=[], err=0;
            v.innerHTML=`<h3>الذاكرة</h3><div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">${s.map(()=>`<div class="cell" onclick="memC(this)"></div>`).join('')}</div>`;
            window.memC=(el)=>{ if(sel.length<2 && !el.innerText){ el.innerText=s[[...el.parentNode.children].indexOf(el)]; sel.push(el); if(sel.length===2){ if(sel[0].innerText===sel[1].innerText){ sfx(700); sel=[]; if([...el.parentNode.children].every(x=>x.innerText)) showResult("ممتاز!", "", true); } else { sfx(150,0.3); setTimeout(()=>{sel[0].innerText=''; sel[1].innerText=''; sel=[]; err++; if(err>=5) showResult("فشل!", "الروبوت ذاكرته أقوى", false);},500); } } } };
        }

        // --- 5. السرعة ---
        function loadTap(v) {
            let c=0, t=5; v.innerHTML=`<h3>السرعة (25)</h3><h1 id="tt">5</h1><button class="btn" id="tbb">إبدأ!</button><h2>نقرات: <span id="cc">0</span></h2>`;
            const b=document.getElementById('tbb');
            b.onclick=()=>{ if(t===5){ timerInterval=setInterval(()=>{ t--; document.getElementById('tt').innerText=t; if(t<=0){ clearInterval(timerInterval); showResult(c>=25?"برق!":"بطيء!", `نقراتك: ${c}`, c>=25); } },1000); } c++; document.getElementById('cc').innerText=c; sfx(500,0.05); };
        }
    </script>
</body>
</html>

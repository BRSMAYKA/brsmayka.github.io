<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستوديو ألعاب BRSMAYKA - النسخة النهائية</title>
    <style>
        :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #161616; --player: #ff0055; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        .header { margin-bottom: 30px; animation: fadeIn 1s; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }

        /* تصميم كروت الألعاب */
        .game-card {
            background: var(--card); border: 2px solid #333; width: 220px; border-radius: 20px;
            padding: 25px; cursor: pointer; transition: 0.3s; position: relative;
        }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        .game-icon { width: 60px; height: 60px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; background: #222; border-radius: 50%; }

        /* نافذة اللعب */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding-top: 50px; }
        .modal-content { background: #1a1a1a; margin: auto; width: 90%; max-width: 450px; padding: 30px; border-radius: 25px; border: 2px solid var(--primary); position: relative; animation: slideUp 0.3s; }
        .close { position: absolute; left: 20px; top: 15px; font-size: 35px; cursor: pointer; color: #888; }

        /* لعبة X-O */
        .xo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 240px; margin: 20px auto; }
        .cell { width: 75px; height: 75px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .cell:hover { background: #333; }
        .cell.x { color: var(--player); }
        .cell.o { color: var(--primary); }

        /* لعبة الكرة */
        #arena { height: 250px; background: #000; position: relative; border-radius: 15px; overflow: hidden; border: 1px solid #444; margin: 15px 0; }
        #target { width: 45px; height: 45px; background: yellow; border-radius: 50%; position: absolute; cursor: pointer; display: none; box-shadow: 0 0 20px yellow; border: 2px solid #fff; }

        .btn { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .reset-btn { background: #ff7300; color: white; display: none; margin: 15px auto 0; }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body onclick="initAudio()">

    <div class="header">
        <h1 style="color: var(--primary);">🎮 مكتبة ألعاب BRSMAYKA</h1>
        <p style="color: #777;">ألعاب ذكية • أصوات تفاعلية • عداد حقيقي</p>
    </div>

    <div class="container">
        <div class="game-card" onmouseenter="playTick()" onclick="openGame('xo')">
            <div class="game-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00ffcc" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4M15 13h.01M18 11h.01"/></svg>
            </div>
            <h3>تحدي X-O</h3>
            <button class="btn">العب ضد الروبوت</button>
        </div>

        <div class="game-card" onmouseenter="playTick()" onclick="openGame('ball')">
            <div class="game-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ff7300" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/></svg>
            </div>
            <h3>صيد الكرة</h3>
            <button class="btn" style="background:#ff7300; color:white;">اختبار السرعة</button>
        </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <div id="gameArea"></div>
            <button id="resetBtn" class="btn reset-btn">إعادة اللعب 🔄</button>
        </div>
    </div>

<script>
    // --- نظام الصوت ---
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(f, d) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d);
    }
    function playTick() { playSound(600, 0.05); }
    function playClick() { playSound(400, 0.1); }

    // --- إدارة الألعاب ---
    let board = ["","","","","","","","",""], gameActive = true, pts = 0, ballTimer;

    function openGame(g) {
        initAudio(); playClick();
        document.getElementById('gameModal').style.display = "block";
        if(g === 'xo') resetXO(); else startBallGame();
    }

    // منطق X-O
    function resetXO() {
        board = ["","","","","","","","",""]; gameActive = true;
        document.getElementById('resetBtn').style.display = "none";
        renderXO();
    }

    function renderXO() {
        document.getElementById('gameArea').innerHTML = `
            <h3>أنت <span style="color:var(--player)">(X)</span> ضد الروبوت <span style="color:var(--primary)">(O)</span></h3>
            <div class="xo-grid">${board.map((v,i)=>`<div class="cell ${v.toLowerCase()}" onclick="playerMove(${i})">${v}</div>`).join('')}</div>
            <h2 id="status"></h2>
        `;
    }

    function playerMove(i) {
        if(board[i] === "" && gameActive) {
            board[i] = "X"; playClick();
            if(!checkWinner()) { renderXO(); setTimeout(robotMove, 400); }
            else { renderXO(); }
        }
    }

    function robotMove() {
        if(!gameActive) return;
        let empty = board.map((v,i)=> v==="" ? i : null).filter(v=> v!==null);
        if(empty.length > 0) {
            board[empty[Math.floor(Math.random()*empty.length)]] = "O";
            checkWinner(); renderXO();
        }
    }

    function checkWinner() {
        const win = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let p of win) {
            const [a,b,c] = p;
            if(board[a] && board[a] === board[b] && board[a] === board[c]) {
                gameActive = false;
                let msg = (board[a] === "X") ? "مبروك! لقد فزت 🔥" : "للأسف! الروبوت فاز 🤖";
                endGame(msg); return true;
            }
        }
        if(!board.includes("")) { gameActive = false; endGame("تعادل! 🤝"); return true; }
        return false;
    }

    function endGame(m) {
        setTimeout(() => {
            document.getElementById('status').innerText = m;
            const r = document.getElementById('resetBtn');
            r.style.display = "block"; r.onclick = resetXO;
        }, 200);
    }

    // منطق الكرة
    function startBallGame() {
        pts = 0; document.getElementById('resetBtn').style.display = "none";
        document.getElementById('gameArea').innerHTML = `<h3>اصطاد الكرة الصفراء!</h3><div id="arena"><div id="target" onclick="hitBall()"></div></div><h2 id="score">النقاط: 0</h2>`;
        moveBall();
    }
    function moveBall() {
        clearTimeout(ballTimer); const t = document.getElementById('target');
        if(!t) return;
        t.style.display = "block"; t.style.top = Math.random()*190+"px"; t.style.left = Math.random()*360+"px";
        ballTimer = setTimeout(moveBall, 1200);
    }
    function hitBall() { pts++; playClick(); document.getElementById('score').innerText = "النقاط: "+pts; moveBall(); }

    function closeGame() { clearTimeout(ballTimer); document.getElementById('gameModal').style.display = "none"; }
</script>

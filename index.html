<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRSMAYKA GAMING - 2026 🚀</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff3366; --bg: #0a0a0a; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: white; font-family: 'Lexend', sans-serif; margin: 0; padding: 20px; text-align: center; overflow-x: hidden; }
        
        #persistent-score {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0, 255, 204, 0.15);
            border: 2px solid var(--primary);
            padding: 10px 15px; border-radius: 12px;
            font-weight: bold; z-index: 10001;
            backdrop-filter: blur(8px);
        }

        .header-box { margin-bottom: 25px; }
        .header-box h1 { font-size: 2rem; color: var(--primary); text-shadow: 0 0 15px var(--primary); margin: 0; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .game-card { background: #151515; border: 1px solid #333; width: 145px; border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); background: #1a1a1a; }
        .game-card h3 { margin: 10px 0 5px; font-size: 1rem; }
        .game-card small { color: var(--secondary); font-weight: bold; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 5vh auto; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; border: 2px solid var(--primary); position: relative; min-height: 450px; display: flex; flex-direction: column; align-items: center; }
        
        #timer-container { width: 100%; height: 8px; background: #222; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        #result-overlay { display: none; position: absolute; inset: 0; background: #111; z-index: 100; flex-direction: column; align-items: center; justify-content: center; border-radius: 23px; padding: 20px; }
        .win-text { color: #00ff88; font-size: 2rem; text-shadow: 0 0 15px #00ff88; }
        .lose-text { color: var(--secondary); font-size: 2rem; text-shadow: 0 0 15px var(--secondary); }
        
        .btn { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 50px; cursor: pointer; font-weight: 800; width: 85%; margin-top: 15px; text-transform: uppercase; }
        .cell { background: #1a1a1a; border-radius: 15px; display: flex; align-items: center; justify-content: center; height: 70px; width: 70px; font-size: 30px; border: 1px solid #333; cursor: pointer; color: var(--primary); transition: 0.2s; }
        .flipped { background: #222; border-color: var(--primary); }
    </style>
</head>
<body onload="loadGlobalScore()" onclick="initAudio()">

    <div id="persistent-score">Points: <span id="total-points">0</span></div>

    <div class="header-box">
        <h1>BRSMAYKA GAMING</h1>
        <div class="counter-wrapper">
            <div id="sfcj1hadcun8xqdfhbzttteef2bq7wl376p"></div>
        </div>
    </div>

    <div class="container">
        <div class="game-card" onclick="playStartSfx(); start('mem')"> 🧠 <h3>Memory IQ</h3><small>30s</small> </div>
        <div class="game-card" onclick="playStartSfx(); start('math')"> ➗ <h3>Math Dash</h3><small>5s</small> </div>
        <div class="game-card" onclick="playStartSfx(); start('xo')"> ❌ <h3>Tic-Tac-Toe</h3><small>15s</small> </div>
        <div class="game-card" onclick="playStartSfx(); start('ball')"> 👻 <h3>Ghost Hunt</h3><small>15s</small> </div>
        <div class="game-card" onclick="playStartSfx(); start('tap')"> ⚡ <h3>Hyper Tap</h3><small>7s</small> </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; right:20px; top:15px; font-size:30px; cursor:pointer;" onclick="stop()">&times;</span>
            <div id="timer-container"><div id="timer-bar"></div></div>
            <div id="game-view" style="width:100%"></div>
            <div id="result-overlay">
                <h1 id="result-msg"></h1>
                <p id="result-details"></p>
                <button class="btn" onclick="hideResult()">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://counter1.optistats.ovh/private/counter.js?c=j1hadcun8xqdfhbzttteef2bq7wl376p&down=async" async></script>

    <script>
        let audioCtx, currentMode, score = 0, gameTimer, timeLeft, totalTime, globalPoints = 0;
        let flippedCards = [];

        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        
        // دالة توليد الأصوات
        function playSound(f, t, d, v=0.1) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        // أصوات اللعبة
        const playStartSfx = () => { playSound(400, 'square', 0.1); setTimeout(()=>playSound(600, 'square', 0.15), 50); };
        const winSfx = () => { playSound(523, 'sine', 0.2); setTimeout(()=>playSound(659, 'sine', 0.2), 100); setTimeout(()=>playSound(783, 'sine', 0.3), 200); };
        const loseSfx = () => { playSound(150, 'sawtooth', 0.5); };
        const clickSfx = () => { playSound(800, 'sine', 0.05, 0.05); };

        function loadGlobalScore() {
            globalPoints = parseInt(localStorage.getItem('brs_gaming_score')) || 0;
            document.getElementById('total-points').innerText = globalPoints;
        }

        function updateTimer() {
            timeLeft -= 0.1;
            const percent = (timeLeft / totalTime) * 100;
            document.getElementById('timer-bar').style.width = percent + '%';
            if(timeLeft <= 0) showResult('TIME OVER!', 'You were too slow!', false);
        }

        function showResult(msg, details, isWin) {
            clearInterval(gameTimer);
            const overlay = document.getElementById('result-overlay');
            document.getElementById('result-msg').innerText = msg;
            document.getElementById('result-msg').className = isWin ? 'win-text' : 'lose-text';
            document.getElementById('result-details').innerText = details;
            if(isWin) {
                winSfx();
                globalPoints += 50;
                localStorage.setItem('brs_gaming_score', globalPoints);
                document.getElementById('total-points').innerText = globalPoints;
            } else { loseSfx(); }
            overlay.style.display = 'flex';
        }

        function hideResult() { document.getElementById('result-overlay').style.display = 'none'; start(currentMode); }
        function stop() { clearInterval(gameTimer); document.getElementById('gameModal').style.display = 'none'; }

        function start(mode) {
            currentMode = mode; score = 0; flippedCards = [];
            clearInterval(gameTimer);
            document.getElementById('gameModal').style.display = 'block';
            const view = document.getElementById('game-view');
            view.innerHTML = '';

            const configs = { mem: 30, math: 5, xo: 15, ball: 15, tap: 7 };
            totalTime = timeLeft = configs[mode];
            gameTimer = setInterval(updateTimer, 100);

            if(mode === 'mem') {
                const fruits = ['🍎','🍎','🍌','🍌','🍇','🍇','🍉','🍉','🍓','🍓','🍍','🍍'].sort(()=>Math.random()-0.5);
                view.innerHTML = `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; justify-items:center;" id="grid"></div>`;
                fruits.forEach(f => {
                    const c = document.createElement('div'); c.className = 'cell'; c.innerText = '?';
                    c.onclick = () => {
                        if(flippedCards.length < 2 && !c.classList.contains('flipped')) {
                            clickSfx(); c.innerText = f; c.classList.add('flipped');
                            flippedCards.push({el: c, val: f});
                            if(flippedCards.length === 2) {
                                if(flippedCards[0].val === flippedCards[1].val) {
                                    score++; flippedCards = []; if(score===6) showResult('WINNER!', 'God Memory!', true);
                                } else {
                                    setTimeout(() => { flippedCards.forEach(x=>{x.el.innerText='?'; x.el.classList.remove('flipped');}); flippedCards=[]; }, 500);
                                }
                            }
                        }
                    };
                    document.getElementById('grid').appendChild(c);
                });
            } else if(mode === 'math') {
                const a = Math.floor(Math.random()*20), b = Math.floor(Math.random()*20), ans = a+b;
                const opts = [ans, ans+Math.floor(Math.random()*5+1), ans-Math.floor(Math.random()*3+1), ans+10].sort(()=>Math.random()-0.5);
                view.innerHTML = `<h2>Solve This:</h2><h1 style="font-size:3.5rem; margin:10px 0;">${a} + ${b}</h1><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%">${opts.map(o=>`<button class="btn" style="width:100%" onclick="clickSfx(); o===${ans}?showResult('CORRECT','IQ 200!',true):showResult('WRONG','Incorrect!',false)">${o}</button>`).join('')}</div>`;
            } else if(mode === 'tap') {
                view.innerHTML = `<h2>TAP 30 TIMES!</h2><button id="t-btn" class="btn" style="height:150px; font-size:4rem;" onclick="clickSfx(); score++; this.innerText=score; if(score>=30) showResult('SONIC!','Super Speed!',true)">0</button>`;
            } else if(mode === 'ball') {
                view.innerHTML = `<div style="height:300px; position:relative; background:#000; border-radius:15px; overflow:hidden;"><div id="ghost" style="position:absolute; font-size:50px; cursor:pointer;">👻</div></div><p>Catch 10 Ghosts!</p>`;
                const g = document.getElementById('ghost'); const move = () => { g.style.left = Math.random()*80+'%'; g.style.top = Math.random()*80+'%'; }; move();
                g.onclick = () => { clickSfx(); score++; move(); if(score>=10) showResult('HUNTER!','10/10 Ghosts!',true); };
            } else if(mode === 'xo') {
                view.innerHTML = `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; justify-items:center;" id="xo-grid"></div>`;
                let b = Array(9).fill('');
                for(let i=0; i<9; i++) {
                    const c = document.createElement('div'); c.className = 'cell';
                    c.onclick = () => { if(!b[i]){ clickSfx(); b[i]='X'; c.innerText='X'; checkWinXO(b); } };
                    document.getElementById('xo-grid').appendChild(c);
                }
            }
        }

        function checkWinXO(b) {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let s of w) if(b[s[0]] && b[s[0]]===b[s[1]] && b[s[0]]===b[s[2]]) return showResult('WINNER!','🏆 You beat it!',true);
            if(!b.includes('')) showResult('DRAW!','🤝 Fair play!',true);
        }
    </script>
</body>
</html>
